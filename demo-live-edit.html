<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实时编辑 · 画布同步 — LIVE EDIT</title>
<!-- 共享设计语言：像素字体 + 配色变量 -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
:root {
  --bg: #f0ebe0; --bg-canvas: #e8e2d4; --bg-panel: #faf7f0;
  --bg-card: #ffffff; --bg-card-hi: #f5f1e8;
  --primary: #4a7c9e; --primary-dim: #6b9bb8; --primary-bg: #e3edf3;
  --success: #5b8c5a; --success-bg: #e8f0e8;
  --warning: #c4944a; --warning-bg: #f5edd9;
  --asset: #8b6fb0; --asset-bg: #ede8f5;
  --text: #3d3d3d; --text-dim: #8a8a8a; --text-hi: #1a1a1a;
  --border: #c9c2b0; --border-hi: #a89e85; --shadow: #d4cdb9;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'VT323', monospace;
  background: var(--bg); color: var(--text); font-size: 18px;
  user-select: none; -webkit-user-select: none;
}

/* ===== 顶部标题栏 ===== */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 60px;
  background: var(--bg-panel); border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 14px; padding: 0 20px;
}
.brand { display: flex; flex-direction: column; gap: 3px; }
.brand .title { font-family: 'Press Start 2P', monospace; font-size: 14px; color: var(--text-hi); letter-spacing: 0.5px; }
.brand .desc { font-size: 17px; color: var(--text-dim); }
.topbar .spacer { flex: 1; }
.topbar .pill {
  font-family: 'Press Start 2P', monospace; font-size: 9px;
  padding: 7px 11px; border: 2px solid var(--warning); background: var(--warning-bg); color: var(--warning);
  display: flex; align-items: center; gap: 8px;
}
.topbar .pill .dot { width: 8px; height: 8px; background: var(--warning); animation: blink 1.2s steps(2) infinite; }
@keyframes blink { 50% { opacity: 0.25; } }

/* ===== 主体分屏 ===== */
.main { position: fixed; top: 60px; left: 0; right: 0; bottom: 0; display: flex; }

/* ===== 左侧 Agent 对话 ===== */
.chat {
  width: 38%; min-width: 320px; max-width: 460px;
  background: var(--bg-panel); border-right: 2px solid var(--border);
  display: flex; flex-direction: column;
}
.chat-head {
  padding: 12px 16px; border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.chat-head .avatar {
  width: 34px; height: 34px; background: var(--asset); border: 2px solid var(--border-hi);
  box-shadow: 3px 3px 0 0 var(--shadow);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Press Start 2P', monospace; font-size: 10px; color: #fff;
}
.chat-head .meta { display: flex; flex-direction: column; gap: 2px; }
.chat-head .name { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--text-hi); }
.chat-head .sub { font-size: 15px; color: var(--text-dim); }

.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.messages::-webkit-scrollbar { width: 8px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); }

.msg { display: flex; gap: 8px; max-width: 92%; animation: msgIn 0.2s steps(4); }
@keyframes msgIn { 0% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; transform: translateY(0); } }
.msg.agent { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg .bubble {
  padding: 9px 12px; border: 2px solid var(--border); background: var(--bg-card);
  box-shadow: 3px 3px 0 0 var(--shadow); font-size: 17px; line-height: 1.4; color: var(--text);
  word-break: break-word; white-space: pre-wrap;
}
.msg.agent .bubble { border-color: var(--asset); background: var(--asset-bg); }
.msg.user .bubble { border-color: var(--primary); background: var(--primary-bg); }
.msg .bubble .who { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--text-dim); margin-bottom: 5px; }
/* agent 正在写入的消息：带"写入 ch01.md"标识 + 打字光标 */
.msg.writing .bubble { border-color: var(--warning); background: var(--warning-bg); }
.msg.writing .bubble .tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--warning);
  margin-bottom: 6px;
}
.msg.writing .bubble .tag::before { content: '\270E'; font-family: monospace; font-size: 11px; }
/* 打字光标 */
.caret {
  display: inline-block; width: 8px; height: 16px; background: var(--warning);
  vertical-align: text-bottom; margin-left: 2px; animation: caret-blink 0.7s steps(2) infinite;
}
@keyframes caret-blink { 50% { opacity: 0; } }

/* agent 思考中三点 */
.thinking { display: flex; gap: 8px; align-self: flex-start; }
.thinking .bubble { padding: 12px 14px; border: 2px solid var(--asset); background: var(--asset-bg); box-shadow: 3px 3px 0 0 var(--shadow); display: flex; gap: 5px; }
.thinking .dot { width: 7px; height: 7px; background: var(--asset); animation: typing 1s steps(4) infinite; }
.thinking .dot:nth-child(2) { animation-delay: 0.15s; }
.thinking .dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes typing { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

.composer { border-top: 2px solid var(--border); padding: 10px 12px; display: flex; gap: 8px; }
.composer input {
  flex: 1; padding: 9px 10px; border: 2px solid var(--border); background: var(--bg-card);
  font-family: 'VT323', monospace; font-size: 17px; color: var(--text); outline: none;
}
.composer input:focus { border-color: var(--primary); }
.composer .send {
  padding: 0 14px; border: 2px solid var(--primary); background: var(--primary-bg);
  font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--primary); cursor: pointer;
}
.composer .send:hover { background: #d6e6ef; }
.composer .write-btn {
  width: 100%; margin-top: 8px; padding: 11px 14px;
  border: 2px solid var(--warning); background: var(--warning); color: #fff;
  font-family: 'Press Start 2P', monospace; font-size: 9px; cursor: pointer;
  box-shadow: 3px 3px 0 0 var(--shadow); transition: transform 0.1s;
}
.composer .write-btn:hover { transform: translate(2px, 2px); box-shadow: 1px 1px 0 0 var(--shadow); }
.composer .write-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0 0 var(--shadow); }
.composer .write-btn:disabled { background: var(--bg-card-hi); color: var(--text-dim); border-color: var(--border); cursor: not-allowed; box-shadow: none; transform: none; }
.composer-hint { font-size: 14px; color: var(--text-dim); padding: 0 12px 10px; line-height: 1.3; }

/* ===== 右侧画布 ===== */
.canvas-wrap { flex: 1; position: relative; background: var(--bg-canvas); }
.canvas-bar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  padding: 10px 16px; display: flex; align-items: center; gap: 12px;
  background: linear-gradient(var(--bg-panel), rgba(250,247,240,0.6));
  border-bottom: 1px dashed var(--border);
}
.canvas-bar .ctitle { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--text-hi); }
.canvas-bar .ccount { font-size: 15px; color: var(--text-dim); }
.canvas-bar .spacer { flex: 1; }
.zoom-mini { display: flex; gap: 4px; }
.zoom-mini button {
  width: 28px; height: 26px; border: 2px solid var(--border); background: var(--bg-card);
  font-family: 'Press Start 2P', monospace; font-size: 9px; cursor: pointer; color: var(--text);
}
.zoom-mini button:hover { background: var(--bg-card-hi); }

.viewport { position: absolute; top: 50px; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; }
.viewport.panning { cursor: grabbing; }
.world {
  position: absolute; top: 0; left: 0; width: 3000px; height: 2200px; transform-origin: 0 0;
  background-color: var(--bg-canvas);
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px),
    linear-gradient(rgba(201,194,176,0.35) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,194,176,0.35) 1px, transparent 1px);
  background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
}

/* ===== 文件节点 ===== */
.file-node {
  position: absolute; width: 360px; background: var(--bg-card);
  border: 2px solid var(--border-hi); box-shadow: 5px 5px 0 0 var(--shadow);
  transition: border-color 0.15s, box-shadow 0.15s;
}
/* 编辑中：边框变橙、加发光脉冲 */
.file-node.editing { border-color: var(--warning); animation: node-editing 1.1s steps(8) infinite; }
@keyframes node-editing {
  0%,100% { box-shadow: 5px 5px 0 0 var(--shadow), 0 0 0 0 rgba(196,148,74,0); }
  50% { box-shadow: 5px 5px 0 0 var(--shadow), 0 0 0 4px rgba(196,148,74,0.25); }
}
/* 同步完成：整体闪一下绿 */
.file-node.synced-flash { animation: node-synced 1.1s steps(8); }
@keyframes node-synced {
  0%,100% { border-color: var(--border-hi); box-shadow: 5px 5px 0 0 var(--shadow); }
  30% { border-color: var(--success); box-shadow: 5px 5px 0 0 var(--success), 0 0 0 3px var(--success-bg); }
}

.node-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-bottom: 2px solid var(--border); background: var(--bg-card-hi);
}
.node-bar .file-ico {
  font-family: 'Press Start 2P', monospace; font-size: 9px; color: #fff; background: var(--primary);
  padding: 3px 5px;
}
.node-bar .file-name { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--text-hi); flex: 1; }

/* 顶部状态指示器 */
.status-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  padding: 4px 7px; border: 1px solid var(--border-hi); background: var(--bg-card); color: var(--text-dim);
}
.status-pill .sdot { width: 7px; height: 7px; background: var(--text-dim); }
.status-pill.editing { color: var(--warning); border-color: var(--warning); background: var(--warning-bg); }
.status-pill.editing .sdot { background: var(--warning); animation: blink 0.8s steps(2) infinite; }
.status-pill.synced { color: var(--success); border-color: var(--success); background: var(--success-bg); }
.status-pill.synced .sdot { background: var(--success); }

/* 节点内容预览 */
.node-preview {
  max-height: 280px; overflow-y: auto; padding: 10px 12px;
  font-size: 18px; line-height: 1.55; color: var(--text); user-select: text; -webkit-user-select: text;
}
.node-preview::-webkit-scrollbar { width: 7px; }
.node-preview::-webkit-scrollbar-thumb { background: var(--border); }
.preview-line { padding: 1px 4px; margin: 0 -4px; white-space: pre-wrap; word-break: break-word; }
.preview-line.heading { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--text-hi); margin: 0 0 6px; line-height: 1.4; }
.preview-line.blank { height: 8px; }
/* 已确认行（本次新增标记）：淡橙背景，编辑结束后渐隐 */
.preview-line.committed.just-added { background: var(--warning-bg); box-shadow: inset 3px 0 0 var(--warning); }
.file-node.edit-done .preview-line.just-added { background: transparent; box-shadow: none; transition: background 0.8s, box-shadow 0.8s; }
/* 正在写入的行：闪烁高亮 */
.preview-line.writing { background: #fff3d0; box-shadow: inset 3px 0 0 var(--warning); animation: writing-flash 0.55s steps(2) infinite; }
@keyframes writing-flash { 50% { background: var(--warning-bg); } }

/* 节点底部状态条 */
.node-foot {
  padding: 6px 10px; border-top: 1px dashed var(--border);
  display: flex; align-items: center; justify-content: space-between;
  font-size: 14px; color: var(--text-dim);
}
.node-foot .live { display: flex; align-items: center; gap: 5px; }
.node-foot .live .ldot { width: 7px; height: 7px; background: var(--text-dim); }
.file-node.editing .node-foot .live { color: var(--warning); }
.file-node.editing .node-foot .ldot { background: var(--warning); animation: blink 0.8s steps(2) infinite; }

/* 从对话指向节点的同步脉冲提示（画布右下角说明） */
.tip {
  position: fixed; right: 20px; bottom: 20px; z-index: 90;
  background: var(--bg-panel); border: 2px solid var(--border); box-shadow: 3px 3px 0 0 var(--shadow);
  padding: 8px 12px; font-size: 15px; color: var(--text-dim); max-width: 320px; line-height: 1.3;
}
.tip b { color: var(--warning); font-weight: normal; }
</style>
</head>
<body>

<!-- 顶部标题栏 -->
<div class="topbar">
  <div class="brand">
    <div class="title">LIVE EDIT</div>
    <div class="desc">实时编辑 — Agent 写文件时，画布上同步看见它在变</div>
  </div>
  <div class="spacer"></div>
  <div class="pill"><span class="dot"></span>EDITING LIVE</div>
</div>

<div class="main">
  <!-- 左侧对话 -->
  <aside class="chat">
    <div class="chat-head">
      <div class="avatar">A</div>
      <div class="meta">
        <span class="name">PIXEL AGENT</span>
        <span class="sub">写作助手 · 正在监听 ch01.md</span>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="composer">
      <input id="quickInput" type="text" placeholder="发消息给 agent，或直接点下方按钮让它写…" />
      <button class="send" id="quickSend">发送</button>
      <button class="write-btn" id="writeBtn">让 agent 写一段</button>
    </div>
    <div class="composer-hint">提示：画布可拖动平移、滚轮缩放；节点里橙底闪烁的行就是 agent 此刻正在写的内容。</div>
  </aside>

  <!-- 右侧画布 -->
  <section class="canvas-wrap">
    <div class="canvas-bar">
      <span class="ctitle">CANVAS</span>
      <span class="ccount" id="zoomLabel">100%</span>
      <span class="spacer"></span>
      <div class="zoom-mini">
        <button id="zoomOut">-</button>
        <button id="zoomReset">RST</button>
        <button id="zoomIn">+</button>
      </div>
    </div>
    <div class="viewport" id="viewport">
      <div class="world" id="world">
        <!-- 文件节点 ch01.md：位置由 JS 初始化居中 -->
        <div class="file-node" id="fileNode" style="left:180px; top:120px;">
          <div class="node-bar">
            <span class="file-ico">MD</span>
            <span class="file-name">ch01.md</span>
            <span class="status-pill synced" id="statusPill"><span class="sdot"></span>SYNCED</span>
          </div>
          <div class="node-preview" id="nodePreview"></div>
          <div class="node-foot">
            <span class="live"><span class="ldot"></span><span id="footText">已同步</span></span>
            <span id="lineCount">0 行</span>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<div class="tip">
  <b>看点：</b>不用翻对话，右边节点就是文件本体 —— agent 每写一句，橙底行实时长出来。
</div>

<script>
/* ============================================================
   实时编辑演示核心逻辑
   - 左侧对话逐字打字（agent 正在写入）
   - 右侧文件节点 ch01.md 内容实时同步追加
   - 编辑中指示器脉冲；写完变「已同步」
   - 画布可平移、滚轮缩放
   ============================================================ */

// 小工具
const $ = (id) => document.getElementById(id);
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

// ---------- 预设剧本：小说第一章「边境集市」 ----------
// 初始文件内容（节点上先显示这些）
const INITIAL_LINES = [
  { type: 'heading', text: '第一章 边境集市' },
  { type: 'blank' },
  { type: 'text', text: '晨雾还未散尽，边境集市的摊贩们已经支起了棚子。' },
  { type: 'text', text: '艾琳裹紧斗篷，混在早起的人群里。' },
  { type: 'text', text: '她已经两天没吃东西了。' },
];

// agent 续写剧本，每段包含一句「思考」+ 若干「写入行」
const SEGMENTS = [
  {
    think: '她两天没吃东西了，刚出炉的面包对她诱惑太大。我顺着集市开场往下写。',
    lines: [
      '她的目光被一炉刚出炉的麦面包攫住了。',
      '金黄的面包还冒着热气，摊主正扭头和邻摊讨价还价。',
      '艾琳屏住呼吸，指尖触到了粗糙温热的面包皮。',
    ],
  },
  {
    think: '现在把紧张感拉满，让她当场被抓现行。',
    lines: [
      '就在她抽身欲走的瞬间，一只粗糙的手攥住了她的手腕。',
      '"小丫头，"沙哑的声音贴着耳朵响起，"我盯着你很久了。"',
      '艾琳僵在原地，面包从指缝滑落，滚进泥里。',
    ],
  },
  {
    think: '给她一个硬气的反击，埋下后续交锋的伏笔。',
    lines: [
      '她猛地抬眼，对上一双浑浊却精明的眼睛。',
      '摊主是个瘸腿的老兵，腰间别着一把缺了口的短刀。',
      '"放手，"艾琳压低声音，"否则让你更瘸。"',
    ],
  },
];

// ---------- DOM ----------
const messagesEl = $('messages');
const writeBtn = $('writeBtn');
const quickInput = $('quickInput');
const quickSend = $('quickSend');
const nodePreview = $('nodePreview');
const statusPill = $('statusPill');
const fileNode = $('fileNode');
const footText = $('footText');
const lineCount = $('lineCount');

// ---------- 状态 ----------
let segIndex = 0;       // 下一段续写的索引
let isEditing = false;  // 是否正在编辑（加锁，避免重复触发）

// ---------- 初始化对话 ----------
function addMessage(role, text, opts = {}) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role + (opts.writing ? ' writing' : '');
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (opts.writing) {
    bubble.innerHTML = '<span class="tag">写入 ch01.md</span>';
  }
  const span = document.createElement('span');
  span.className = 'text';
  span.textContent = text;
  bubble.appendChild(span);
  if (opts.caret) {
    const c = document.createElement('span');
    c.className = 'caret';
    bubble.appendChild(c);
  }
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return { wrap, span, bubble };
}

// 显示 agent 思考三点
function showThinking() {
  const wrap = document.createElement('div');
  wrap.className = 'thinking';
  wrap.innerHTML = '<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

// ---------- 初始化节点内容 ----------
function renderInitialNode() {
  nodePreview.innerHTML = '';
  INITIAL_LINES.forEach((l) => appendPreviewLine(l.type, l.text, { committed: true }));
  updateLineCount();
}
// 往节点追加一行；type: heading / blank / text
function appendPreviewLine(type, text = '', opts = {}) {
  const line = document.createElement('div');
  line.className = 'preview-line';
  if (type === 'heading') line.classList.add('heading');
  if (type === 'blank') { line.classList.add('blank'); }
  line.textContent = text;
  if (opts.committed) line.classList.add('committed');
  if (opts.justAdded) line.classList.add('just-added');
  if (opts.writing) line.classList.add('writing');
  nodePreview.appendChild(line);
  nodePreview.scrollTop = nodePreview.scrollHeight;
  return line;
}
function updateLineCount() {
  const n = nodePreview.querySelectorAll('.preview-line:not(.blank)').length;
  lineCount.textContent = n + ' 行';
}

// ---------- 状态指示器 ----------
function setStatus(state) {
  fileNode.classList.remove('edit-done');
  if (state === 'editing') {
    fileNode.classList.add('editing');
    fileNode.classList.remove('synced-flash');
    statusPill.className = 'status-pill editing';
    statusPill.innerHTML = '<span class="sdot"></span>EDITING';
    footText.textContent = '编辑中…';
  } else {
    fileNode.classList.remove('editing');
    fileNode.classList.add('synced-flash');
    statusPill.className = 'status-pill synced';
    statusPill.innerHTML = '<span class="sdot"></span>SYNCED';
    footText.textContent = '已同步';
    // 编辑结束：本次新增行的淡橙背景渐隐
    setTimeout(() => fileNode.classList.add('edit-done'), 50);
  }
}

// ---------- 核心：让 agent 逐字写入一段 ----------
async function runSegment(segment) {
  if (isEditing) return;
  isEditing = true;
  writeBtn.disabled = true;

  // 清除上一次新增行的 just-added 标记，保证本次只有新写的行带高亮
  nodePreview.querySelectorAll('.preview-line.just-added').forEach((el) => el.classList.remove('just-added'));

  // 1. agent 先「思考」
  setStatus('editing');
  const think = showThinking();
  await sleep(700);
  think.remove();
  addMessage('agent', segment.think);

  await sleep(350);

  // 2. agent 开始写入：对话窗口逐字显示，同时节点同步
  //    创建对话里的写入消息（带打字光标）
  const msg = addMessage('agent', '', { writing: true, caret: true });

  for (const line of segment.lines) {
    // 在节点里新建一个「正在写入」行，内容逐字增长
    const writingLine = appendPreviewLine('text', '', { writing: true });
    await typeLine(line, (ch) => {
      msg.span.textContent += ch;          // 对话窗口同步逐字
      writingLine.textContent += ch;       // 节点同步逐字
      nodePreview.scrollTop = nodePreview.scrollHeight;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
    // 本句写完：固化为已确认行（带本次新增标记），对话换行
    writingLine.classList.remove('writing');
    writingLine.classList.add('committed', 'just-added');
    msg.span.textContent += '\n';
    updateLineCount();
    await sleep(260);
  }

  // 移除打字光标
  const caret = msg.bubble.querySelector('.caret');
  if (caret) caret.remove();
  msg.wrap.classList.remove('writing');

  // 3. 写完：状态变「已同步」
  setStatus('synced');
  segIndex++;
  refreshWriteBtn();
  isEditing = false;
}

// 逐字打字：把一句话逐字喂给回调
async function typeLine(text, onChar) {
  for (const ch of text) {
    onChar(ch);
    // 中文略慢，标点更快，营造书写节奏
    const delay = /[，。！？、；：""''…]/.test(ch) ? 120 : 42;
    await sleep(delay);
  }
}

// ---------- 触发入口 ----------
async function triggerNext(userText) {
  if (isEditing) return;
  if (userText && userText.trim()) {
    addMessage('user', userText.trim());
    await sleep(300);
  }
  if (segIndex >= SEGMENTS.length) {
    // 预设段落用完：agent 友好提示
    addMessage('agent', '这一章我手头的预设续写就到这儿了。你可以继续描述想要的情节，我接着写。');
    return;
  }
  await runSegment(SEGMENTS[segIndex]);
}

// 按钮文案随进度变化
function refreshWriteBtn() {
  if (segIndex >= SEGMENTS.length) {
    writeBtn.textContent = '本章预设已写完';
    writeBtn.disabled = true;
  } else {
    const labels = ['让 agent 写一段 · 接近面包', '让 agent 写一段 · 被发现', '让 agent 写一段 · 对峙'];
    writeBtn.textContent = labels[segIndex] || '让 agent 写一段';
    writeBtn.disabled = false;
  }
}

writeBtn.addEventListener('click', () => triggerNext(''));
quickSend.addEventListener('click', () => {
  const t = quickInput.value;
  if (!t.trim() || isEditing) return;
  quickInput.value = '';
  triggerNext(t);
});
quickInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') quickSend.click();
});

// ---------- 启动 ----------
renderInitialNode();
addMessage('agent', '我是你的写作 agent。右边画布上就是第一章「边境集市」的开头。');
addMessage('agent', '需要我续写偷面包那场戏吗？点「让 agent 写一段」，或直接发消息给我。');
refreshWriteBtn();

/* ============================================================
   画布平移 + 滚轮缩放（以鼠标位置为中心）
   ============================================================ */
const viewport = $('viewport');
const world = $('world');
let view = { x: 0, y: 0, scale: 1 };
const ZOOM_MIN = 0.4, ZOOM_MAX = 2.5;

function applyTransform() {
  world.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
  $('zoomLabel').textContent = Math.round(view.scale * 100) + '%';
}
// 初始把节点放到视口左上偏移位置，并轻微居中
function centerView() {
  const rect = viewport.getBoundingClientRect();
  view.x = Math.max(40, rect.width * 0.12);
  view.y = Math.max(30, rect.height * 0.1);
  view.scale = 1;
  applyTransform();
}
centerView();
window.addEventListener('resize', () => applyTransform());

// 拖拽平移
let panning = false, lastX = 0, lastY = 0;
viewport.addEventListener('mousedown', (e) => {
  // 在节点内容区滚动/选文时，不触发画布拖拽
  if (e.target.closest('.node-preview')) return;
  panning = true; lastX = e.clientX; lastY = e.clientY;
  viewport.classList.add('panning');
});
window.addEventListener('mousemove', (e) => {
  if (!panning) return;
  view.x += e.clientX - lastX;
  view.y += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => { panning = false; viewport.classList.remove('panning'); });

// 滚轮缩放（以鼠标为中心）——先在节点内容区阻止冒泡，让内容自己滚动
nodePreview.addEventListener('wheel', (e) => e.stopPropagation());
viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  let ns = view.scale * factor;
  ns = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, ns));
  // 保持鼠标指向的世界坐标不变
  const wx = (mx - view.x) / view.scale;
  const wy = (my - view.y) / view.scale;
  view.scale = ns;
  view.x = mx - wx * ns;
  view.y = my - wy * ns;
  applyTransform();
}, { passive: false });

// 缩放按钮
function zoomBy(factor) {
  const rect = viewport.getBoundingClientRect();
  const mx = rect.width / 2, my = rect.height / 2;
  const wx = (mx - view.x) / view.scale;
  const wy = (my - view.y) / view.scale;
  let ns = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, view.scale * factor));
  view.scale = ns; view.x = mx - wx * ns; view.y = my - wy * ns;
  applyTransform();
}
$('zoomIn').addEventListener('click', () => zoomBy(1.2));
$('zoomOut').addEventListener('click', () => zoomBy(1 / 1.2));
$('zoomReset').addEventListener('click', () => { view = { x: 0, y: 0, scale: 1 }; centerView(); });
</script>
