<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>节点即画布 — 双击相机进入节点空间</title>
<style>
/* ===== 共享设计语言（像素风） ===== */
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
:root {
  --bg: #f0ebe0; --bg-canvas: #e8e2d4; --bg-panel: #faf7f0;
  --bg-card: #ffffff; --bg-card-hi: #f5f1e8;
  --primary: #4a7c9e; --primary-dim: #6b9bb8; --primary-bg: #e3edf3;
  --success: #5b8c5a; --success-bg: #e8f0e8;
  --warning: #c4944a; --warning-bg: #f5edd9;
  --asset: #8b6fb0; --asset-bg: #ede8f5;
  --text: #3d3d3d; --text-dim: #8a8a8a; --text-hi: #1a1a1a;
  --border: #c9c2b0; --border-hi: #a89e85; --shadow: #d4cdb9;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family:'VT323',monospace; font-size:18px;
  background:var(--bg); color:var(--text); user-select:none;
}

/* ===== 顶栏 ===== */
.topbar {
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:56px; background:var(--bg-panel);
  border-bottom:3px solid var(--border-hi); box-shadow:0 3px 0 var(--shadow);
  display:flex; align-items:center; gap:14px; padding:0 20px;
}
.topbar .badge {
  width:28px; height:28px; background:var(--asset);
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-family:'Press Start 2P',monospace; font-size:10px;
  box-shadow:3px 3px 0 var(--shadow);
}
.topbar .title { font-family:'Press Start 2P',monospace; font-size:13px; color:var(--text-hi); }
.topbar .desc { font-size:17px; color:var(--text-dim); }
.topbar .spacer { flex:1; }
.topbar .hint-list { display:flex; gap:12px; font-size:15px; color:var(--text-dim); flex-wrap:wrap; }
.topbar .hint-item { display:flex; align-items:center; gap:4px; }
.topbar .hint-key {
  background:var(--bg-card); border:2px solid var(--border);
  padding:1px 6px; font-size:13px; color:var(--text);
}

/* ===== 画布区（相机视口） ===== */
.canvas-area {
  position:fixed; top:56px; left:0; right:0; bottom:0;
  overflow:hidden; cursor:grab;
  background-color:var(--bg-canvas);
}
.canvas-area.panning { cursor:grabbing; }
.canvas-area.animating { cursor:default; }
/* 画布网格背景（随相机平移缩放，由 JS 控制） */
.canvas-world {
  position:absolute; top:0; left:0;
  transform-origin:0 0;
  will-change:transform;
}
.connections {
  position:absolute; top:0; left:0;
  width:8000px; height:8000px;
  overflow:visible; pointer-events:none; z-index:0;
}

/* ===== 节点（折叠态：画布上的简要卡片） ===== */
.node {
  position:absolute; z-index:2; width:260px;
  background:var(--bg-card); border:3px solid var(--border-hi);
  box-shadow:5px 5px 0 var(--shadow);
  transition:box-shadow .15s, border-color .15s;
}
.node:hover { box-shadow:7px 7px 0 var(--shadow); border-color:var(--primary-dim); z-index:5; }
.node.dragging { z-index:100; box-shadow:8px 8px 0 var(--shadow); opacity:.95; }
.node.spawn { animation:node-spawn .35s ease; }
@keyframes node-spawn {
  0% { opacity:0; transform:scale(.7); }
  100% { opacity:1; transform:scale(1); }
}
.node.focused { border-color:var(--primary); box-shadow:6px 6px 0 var(--primary-dim); }

/* 折叠态 / 展开态 切换 */
.node .node-collapsed { display:block; }
.node .node-expanded { display:none; }
.node.expanded { width:960px; z-index:10; }
.node.expanded .node-collapsed { display:none; }
.node.expanded .node-expanded { display:block; }
.node.expanded:hover { z-index:20; }

/* 折叠态头部（拖拽手柄） */
.node-head {
  display:flex; align-items:center; gap:6px;
  padding:8px 10px; border-bottom:2px solid var(--border);
  background:var(--bg-card-hi); cursor:grab;
}
.node-head:active { cursor:grabbing; }
.node-dot { width:8px; height:8px; background:var(--primary); flex-shrink:0; }
.node-title {
  font-size:16px; color:var(--text-hi); flex:1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.node-files-row {
  display:flex; align-items:center; gap:6px; margin-bottom:6px; flex-wrap:wrap;
  padding:8px 10px 0;
}
.file-type-chip {
  display:inline-flex; align-items:center; gap:3px;
  padding:2px 6px; border:1px solid var(--border);
  background:var(--bg-panel); font-size:13px; color:var(--text-dim);
}
.file-type-chip .chip-icon { width:10px; height:10px; display:inline-block; flex-shrink:0; }
.file-type-chip.md .chip-icon { background:var(--primary); }
.file-type-chip.image .chip-icon { background:var(--asset); }
.file-count { font-size:14px; color:var(--text-dim); margin-left:auto; }
.file-count b { color:var(--text-hi); font-size:16px; }
.node-preview {
  font-size:15px; line-height:1.5; color:var(--text);
  padding:6px 10px; background:var(--bg-panel);
  border-left:3px solid var(--border);
  max-height:60px; overflow:hidden; position:relative;
}
.node-foot {
  padding:5px 10px; border-top:2px solid var(--border);
  background:var(--bg-card-hi); font-size:13px; color:var(--text-dim);
  display:flex; align-items:center; gap:4px;
}
.node-foot b { color:var(--primary); }

/* ===== 节点展开态：节点内部画布 ===== */
.ne-head {
  display:flex; align-items:center; gap:8px;
  padding:12px 16px; border-bottom:3px solid var(--border-hi);
  background:var(--bg-card-hi);
}
.ne-head .ne-badge {
  width:26px; height:26px; background:var(--primary); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-family:'Press Start 2P',monospace; font-size:10px;
  box-shadow:2px 2px 0 var(--shadow); flex-shrink:0;
}
.ne-title {
  font-family:'Press Start 2P',monospace; font-size:13px; color:var(--text-hi); flex:1;
}
.ne-meta { font-size:14px; color:var(--text-dim); }
.ne-exit {
  font-family:'Press Start 2P',monospace; font-size:9px;
  padding:7px 12px; cursor:pointer; border:2px solid var(--warning);
  background:var(--bg-card); color:var(--warning); box-shadow:3px 3px 0 var(--shadow);
  transition:transform .1s, box-shadow .1s;
}
.ne-exit:hover { transform:translate(1px,1px); box-shadow:2px 2px 0 var(--shadow); background:var(--warning-bg); }
.ne-exit:active { transform:translate(3px,3px); box-shadow:0 0 0; }

/* 展开态内容画布（带网格背景） */
.ne-canvas {
  padding:20px; background-color:var(--bg-canvas);
  background-image:
    linear-gradient(rgba(168,158,133,.22) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,158,133,.22) 1px, transparent 1px);
  background-size:24px 24px;
  min-height:440px;
}
.ne-section-label {
  font-family:'Press Start 2P',monospace; font-size:9px; color:var(--text-dim);
  margin:6px 0 12px; display:flex; align-items:center; gap:6px;
}
.ne-section-label::before {
  content:''; width:10px; height:10px; background:var(--border-hi); display:inline-block;
}
/* 文件区：横向流动排列 */
.ne-files { display:flex; flex-wrap:wrap; gap:16px; margin-bottom:20px; }

/* 图片文件卡片 */
.ne-file-card.image {
  width:340px; background:var(--bg-card); border:3px solid var(--border-hi);
  box-shadow:4px 4px 0 var(--shadow); overflow:hidden; display:flex; flex-direction:column;
}
.ne-file-card.image .nfc-head {
  padding:6px 10px; background:var(--asset-bg); border-bottom:2px solid var(--asset);
  display:flex; align-items:center; gap:6px;
}
.ne-file-card.image .nfc-icon { width:10px; height:10px; background:var(--asset); }
.ne-file-card.image .nfc-name { font-size:14px; color:var(--text-hi); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ne-file-card.image .nfc-type { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--asset); }
.ne-file-card.image .nfc-img-wrap {
  height:240px; display:flex; align-items:center; justify-content:center;
  background:var(--bg-canvas); overflow:hidden;
}
.ne-file-card.image .nfc-img-wrap img {
  max-width:100%; max-height:100%; object-fit:contain; display:block;
}
.ne-file-card.image .nfc-fallback {
  color:var(--text-dim); font-size:14px; padding:20px; text-align:center;
}

/* 文字文件卡片（内容可选中提问） */
.ne-file-card.md {
  flex:1; min-width:380px; background:var(--bg-card); border:3px solid var(--border-hi);
  box-shadow:4px 4px 0 var(--shadow); overflow:hidden; display:flex; flex-direction:column;
}
.ne-file-card.md .nfc-head {
  padding:6px 10px; background:var(--primary-bg); border-bottom:2px solid var(--primary);
  display:flex; align-items:center; gap:6px;
}
.ne-file-card.md .nfc-icon { width:10px; height:10px; background:var(--primary); }
.ne-file-card.md .nfc-name { font-size:14px; color:var(--text-hi); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ne-file-card.md .nfc-type { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--primary); }
/* 可选中文字内容 */
.nfc-text {
  padding:16px 18px; font-size:18px; line-height:1.8; color:var(--text);
  white-space:pre-wrap; word-break:break-word; user-select:text; cursor:text;
  max-height:380px; overflow-y:auto;
}
.nfc-text::selection { background:var(--primary); color:#fff; }

/* 子节点区（展开态内嵌的子节点卡片） */
.ne-children { display:flex; flex-wrap:wrap; gap:14px; }
.ne-child-card {
  width:220px; background:var(--bg-card); border:3px solid var(--border-hi);
  box-shadow:4px 4px 0 var(--shadow); cursor:pointer;
  transition:box-shadow .15s, border-color .15s, transform .15s;
}
.ne-child-card:hover { box-shadow:6px 6px 0 var(--shadow); border-color:var(--primary-dim); transform:translateY(-2px); }
.ne-child-card .ncc-head {
  display:flex; align-items:center; gap:6px;
  padding:7px 10px; border-bottom:2px solid var(--border); background:var(--bg-card-hi);
}
.ne-child-card .ncc-dot { width:8px; height:8px; background:var(--asset); flex-shrink:0; }
.ne-child-card .ncc-title { font-size:15px; color:var(--text-hi); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ne-child-card .ncc-body { padding:8px 10px; }
.ne-child-card .ncc-files { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:6px; }
.ne-child-card .ncc-chip {
  display:inline-flex; align-items:center; gap:3px; padding:1px 5px;
  border:1px solid var(--border); background:var(--bg-panel); font-size:12px; color:var(--text-dim);
}
.ne-child-card .ncc-chip i { width:8px; height:8px; display:inline-block; }
.ne-child-card .ncc-chip.md i { background:var(--primary); }
.ne-child-card .ncc-chip.image i { background:var(--asset); }
.ne-child-card .ncc-preview {
  font-size:14px; color:var(--text-dim); line-height:1.4;
  max-height:42px; overflow:hidden;
}
.ne-child-card .ncc-foot {
  padding:4px 10px; border-top:2px solid var(--border); background:var(--bg-card-hi);
  font-size:12px; color:var(--primary); font-family:'Press Start 2P',monospace; font-size:8px;
}

/* ===== 面包屑导航（固定左上角） ===== */
.breadcrumb {
  position:fixed; top:68px; left:16px; z-index:150;
  display:flex; align-items:center; gap:4px; flex-wrap:wrap;
  background:var(--bg-panel); border:2px solid var(--border-hi);
  padding:8px 12px; box-shadow:3px 3px 0 var(--shadow);
  max-width:calc(100% - 32px); display:none;
}
.breadcrumb.show { display:flex; }
.crumb {
  font-size:15px; color:var(--text); cursor:pointer;
  padding:2px 6px; border:1px solid transparent;
}
.crumb:hover { color:var(--primary); background:var(--primary-bg); border-color:var(--primary-dim); }
.crumb.current { color:var(--text-hi); font-weight:bold; cursor:default; }
.crumb.current:hover { background:none; border-color:transparent; }
.crumb-sep { color:var(--text-dim); font-size:13px; }
.crumb-back {
  font-family:'Press Start 2P',monospace; font-size:9px; color:var(--warning);
  padding:4px 8px; border:2px solid var(--warning); background:var(--bg-card);
  box-shadow:2px 2px 0 var(--shadow); cursor:pointer; margin-right:6px;
  transition:transform .1s, box-shadow .1s;
}
.crumb-back:hover { transform:translate(1px,1px); box-shadow:1px 1px 0 var(--shadow); background:var(--warning-bg); }

/* ===== 选中文字气泡菜单 ===== */
.ask-bubble {
  position:fixed; z-index:420; display:none;
  background:var(--asset); color:#fff;
  padding:7px 14px; cursor:pointer; font-size:15px;
  border:2px solid #fff; box-shadow:3px 3px 0 var(--shadow);
  font-family:'VT323',monospace; white-space:nowrap;
  animation:bubble-in .12s ease;
}
.ask-bubble.show { display:block; }
.ask-bubble:hover { background:#7a5ea0; transform:translate(1px,1px); box-shadow:2px 2px 0 var(--shadow); }
@keyframes bubble-in { from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

/* ===== 提问弹框（紧贴选中文字） ===== */
.ask-popup {
  position:fixed; z-index:430; width:460px;
  background:var(--bg-panel); border:3px solid var(--border-hi);
  box-shadow:6px 6px 0 var(--shadow); padding:14px; display:none;
  animation:popup-in .15s ease;
}
.ask-popup.show { display:block; }
@keyframes popup-in { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
.ap-label {
  font-family:'Press Start 2P',monospace; font-size:10px; color:var(--text-hi);
  margin-bottom:8px; display:flex; align-items:center; gap:6px;
}
.ap-label::before { content:''; width:8px; height:8px; background:var(--asset); }
.ap-ctx-label { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--asset); margin-bottom:4px; }
.ap-context {
  background:var(--asset-bg); border:2px solid var(--asset);
  border-left:5px solid var(--asset); padding:8px 10px;
  font-size:14px; color:var(--text); margin-bottom:10px;
  max-height:72px; overflow-y:auto; white-space:pre-wrap; word-break:break-word;
}
.ap-context::selection { background:var(--asset); color:#fff; }
.ap-question {
  width:100%; min-height:60px; font-family:'VT323',monospace; font-size:16px;
  padding:8px 10px; border:2px solid var(--border-hi);
  background:var(--bg-card); color:var(--text); outline:none; resize:vertical;
}
.ap-question:focus { border-color:var(--asset); }
.ap-actions { display:flex; gap:8px; margin-top:10px; justify-content:flex-end; }
.ap-btn {
  font-family:'Press Start 2P',monospace; font-size:9px;
  padding:7px 12px; cursor:pointer; border:2px solid var(--text-hi);
  box-shadow:3px 3px 0 var(--shadow); transition:transform .1s, box-shadow .1s;
}
.ap-btn:hover { transform:translate(1px,1px); box-shadow:2px 2px 0 var(--shadow); }
.ap-btn:active { transform:translate(3px,3px); box-shadow:0 0 0; }
.ap-btn.send { background:var(--asset); color:#fff; border-color:var(--asset); }
.ap-btn.cancel { background:var(--bg-card); color:var(--text); }
.ap-reply {
  margin-top:10px; background:var(--asset-bg); border:2px solid var(--asset);
  border-left:5px solid var(--asset); padding:10px 12px;
  font-size:16px; line-height:1.6; color:var(--text);
  max-height:200px; overflow-y:auto; white-space:pre-wrap; word-break:break-word;
  display:none; box-shadow:2px 2px 0 var(--shadow);
}
.ap-reply.show { display:block; }
.ap-reply .reply-label {
  font-family:'Press Start 2P',monospace; font-size:8px; color:var(--asset);
  margin-bottom:6px; display:block;
}
.ap-reply.loading { color:var(--text-dim); font-style:italic; }

/* ===== Toast 提示 ===== */
.toast {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%); z-index:600;
  background:var(--success); color:#fff; font-family:'Press Start 2P',monospace;
  font-size:10px; padding:10px 18px; box-shadow:4px 4px 0 var(--shadow);
  animation:toast-show 1.4s ease forwards;
}
@keyframes toast-show {
  0% { opacity:0; transform:translate(-50%,16px); }
  15%,80% { opacity:1; transform:translate(-50%,0); }
  100% { opacity:0; transform:translate(-50%,-8px); }
}

/* ===== 工具栏 ===== */
.toolbar {
  position:fixed; bottom:20px; right:20px; z-index:100;
  display:flex; flex-direction:column; gap:8px;
}
.tool-btn {
  width:48px; height:48px; background:var(--bg-panel);
  border:3px solid var(--border-hi); cursor:pointer;
  font-size:22px; color:var(--text-hi); box-shadow:4px 4px 0 var(--shadow);
  display:flex; align-items:center; justify-content:center;
  transition:transform .1s, box-shadow .1s, background .1s;
  font-family:'VT323',monospace;
}
.tool-btn:hover { transform:translate(2px,2px); box-shadow:2px 2px 0 var(--shadow); background:var(--bg-card-hi); }
.tool-btn:active { transform:translate(4px,4px); box-shadow:0 0 0 var(--shadow); }

/* ===== 状态栏 ===== */
.status-bar { position:fixed; bottom:20px; left:20px; z-index:100; display:flex; gap:8px; }
.status-item {
  background:var(--bg-panel); border:2px solid var(--border-hi);
  padding:8px 14px; font-size:16px; color:var(--text-dim);
  box-shadow:3px 3px 0 var(--shadow);
}
.status-item b { color:var(--text-hi); font-size:20px; }

/* 滚动条 */
::-webkit-scrollbar { width:10px; height:10px; }
::-webkit-scrollbar-track { background:var(--bg-canvas); }
::-webkit-scrollbar-thumb { background:var(--border-hi); border:2px solid var(--bg-canvas); }
::-webkit-scrollbar-thumb:hover { background:var(--text-dim); }
</style>
</head>
<body>

<!-- 顶栏 -->
<header class="topbar">
  <div class="badge">N</div>
  <div class="title">节点即画布</div>
  <div class="desc">— 双击节点，相机平滑进入节点空间</div>
  <div class="spacer"></div>
  <div class="hint-list">
    <div class="hint-item"><span class="hint-key">双击节点</span>相机进入</div>
    <div class="hint-item"><span class="hint-key">选中文字</span>向 agent 提问</div>
    <div class="hint-item"><span class="hint-key">拖头部</span>移动节点</div>
    <div class="hint-item"><span class="hint-key">滚轮</span>缩放画布</div>
    <div class="hint-item"><span class="hint-key">拖空白</span>平移画布</div>
  </div>
</header>

<!-- 画布区（相机视口） -->
<div class="canvas-area" id="canvasArea">
  <div class="canvas-world" id="canvasWorld">
    <svg class="connections" id="connections"></svg>
    <!-- 节点动态生成 -->
  </div>
</div>

<!-- 面包屑导航 -->
<nav class="breadcrumb" id="breadcrumb"></nav>

<!-- 选中文字气泡 -->
<div class="ask-bubble" id="askBubble">向 agent 提问</div>

<!-- 提问弹框 -->
<div class="ask-popup" id="askPopup">
  <div class="ap-label">向 AGENT 提问</div>
  <div class="ap-ctx-label">选中的内容：</div>
  <div class="ap-context" id="apContext"></div>
  <textarea class="ap-question" id="apQuestion" placeholder="输入你的问题（可基于选中内容追问）..."></textarea>
  <div class="ap-actions">
    <button class="ap-btn cancel" id="apCancel">取消</button>
    <button class="ap-btn send" id="apSend">发送</button>
  </div>
  <div class="ap-reply" id="apReply">
    <span class="reply-label">AGENT 回复</span>
    <span id="apReplyText"></span>
  </div>
</div>

<!-- 工具栏 -->
<div class="toolbar">
  <button class="tool-btn" id="zoomInBtn" title="放大">+</button>
  <button class="tool-btn" id="zoomOutBtn" title="缩小">-</button>
  <button class="tool-btn" id="resetViewBtn" title="居中视图">@</button>
</div>

<!-- 状态栏 -->
<div class="status-bar">
  <div class="status-item">节点 <b id="nodeCount">0</b></div>
  <div class="status-item">缩放 <b id="zoomLevel">100%</b></div>
  <div class="status-item">层级 <b id="depthLevel">根层</b></div>
</div>

<script>
// ========================================================
// 节点即画布 —— 相机平滑进入节点空间
// 核心理念：没有弹窗，双击节点 = 画布 transform 平滑动画，
// 相机移动并缩放，使该节点展开后的内部画布占据视口。
// 每一层都是画布，节点内部可放文件/图片/文字/子节点。
// ========================================================

// ===== 预设文件内容（真实小说设定，非占位） =====

// ========================================================
// 相机变换（平移 + 缩放）—— 核心机制
// ========================================================

// 应用当前相机参数到画布世界
function applyTransform() {
  canvasWorld.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  // 画布网格背景随相机同步（增强空间感）
  const gridSize = 24 * zoom;
  canvasArea.style.backgroundImage = `
    linear-gradient(rgba(168,158,133,.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,158,133,.18) 1px, transparent 1px)`;
  canvasArea.style.backgroundSize = `${gridSize}px ${gridSize}px`;
  canvasArea.style.backgroundPosition = `${panX}px ${panY}px`;
  zoomLevelEl.textContent = Math.round(zoom * 100) + '%';
}

// 缓动函数（先慢后快再慢）
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// 相机平滑动画（从当前值过渡到目标值）
function animateCamera(targetPanX, targetPanY, targetZoom, duration) {
  isAnimating = true;
  canvasArea.classList.add('animating');
  const startPanX = panX, startPanY = panY, startZoom = zoom;
  const startTime = performance.now();
  function tick(now) {
    const t = Math.min(1, (now - startTime) / duration);
    const e = easeInOutCubic(t);
    panX = startPanX + (targetPanX - startPanX) * e;
    panY = startPanY + (targetPanY - startPanY) * e;
    zoom = startZoom + (targetZoom - startZoom) * e;
    applyTransform();
    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      isAnimating = false;
      canvasArea.classList.remove('animating');
      updateConnections();
    }
  }
  requestAnimationFrame(tick);
}

// 计算并相机聚焦到某个节点（使其展开后内容居中占据视口）
function focusCameraOnNode(node) {
  // 等待 DOM 更新后获取展开态尺寸
  requestAnimationFrame(() => {
    const w = node.el.offsetWidth || 960;
    const h = node.el.offsetHeight || 560;
    const canvasW = canvasArea.clientWidth;
    const canvasH = canvasArea.clientHeight;
    const padding = 60;
    // 缩放使节点占据视口（留边距），但不超 1.1
    const targetZoom = Math.min(
      (canvasW - padding * 2) / w,
      (canvasH - padding * 2) / h,
      1.1
    );
    const finalZoom = Math.max(0.35, Math.min(targetZoom, 1.1));
    // 使节点中心对齐视口中心
    const targetPanX = canvasW / 2 - (node.x + w / 2) * finalZoom;
    const targetPanY = canvasH / 2 - (node.y + h / 2) * finalZoom;
    animateCamera(targetPanX, targetPanY, finalZoom, 650);
  });
}

// 相机回到根层视图（俯瞰所有节点）
function focusRootView() {
  // 计算所有可见折叠节点的包围盒
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const id in nodeData) {
    const n = nodeData[id];
    if (n.expanded) continue; // 跳过展开态
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + (n.el.offsetWidth || 260));
    maxY = Math.max(maxY, n.y + (n.el.offsetHeight || 150));
  }
  if (minX === Infinity) return;
  const contentW = maxX - minX, contentH = maxY - minY;
  const canvasW = canvasArea.clientWidth, canvasH = canvasArea.clientHeight;
  const padding = 80;
  let targetZoom = Math.min(
    (canvasW - padding * 2) / contentW,
    (canvasH - padding * 2) / contentH,
    1.0
  );
  targetZoom = Math.max(0.3, Math.min(targetZoom, 1.0));
  const targetPanX = (canvasW - contentW * targetZoom) / 2 - minX * targetZoom;
  const targetPanY = (canvasH - contentH * targetZoom) / 2 - minY * targetZoom;
  animateCamera(targetPanX, targetPanY, targetZoom, 650);
}

// ========================================================
// 画布平移 / 缩放交互
// ========================================================

function setupPanZoom() {
  // 滚轮缩放（以鼠标位置为中心）
  canvasArea.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = canvasArea.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const wx = (mx - panX) / zoom;
    const wy = (my - panY) / zoom;
    const delta = e.deltaY < 0 ? 1.12 : 0.89;
    zoom = Math.max(0.25, Math.min(2.5, zoom * delta));
    panX = mx - wx * zoom;
    panY = my - wy * zoom;
    applyTransform();
  }, { passive: false });

  // 拖拽空白处平移画布
  canvasArea.addEventListener('mousedown', (e) => {
    if (isAnimating) return;
    // 仅在画布背景/svg/连接线上启动平移（不干扰节点和文字）
    if (e.target === canvasArea || e.target === canvasWorld ||
        e.target.tagName === 'svg' || e.target.tagName === 'path') {
      isPanning = true;
      panStart = { x: e.clientX - panX, y: e.clientY - panY };
      canvasArea.classList.add('panning');
      hideBubble();
      e.preventDefault();
    }
  });
}

// 全局鼠标移动/释放（处理平移）
document.addEventListener('mousemove', (e) => {
  if (isPanning && panStart) {
    panX = e.clientX - panStart.x;
    panY = e.clientY - panStart.y;
    applyTransform();
  }
});
document.addEventListener('mouseup', () => {
  if (isPanning) {
    isPanning = false; panStart = null;
    canvasArea.classList.remove('panning');
  }
});

// 获取节点预览文字（折叠态卡片显示）
function getNodePreview(node) {
  const mdFile = node.files.find(f => f.type === 'md');
  if (!mdFile) {
    const imgCount = node.files.filter(f => f.type === 'image').length;
    return imgCount > 0 ? `（含 ${imgCount} 张图片）` : '（空节点）';
  }
  const content = FILE_CONTENTS[mdFile.name] || '';
  const lines = content.split('\n');
  for (const line of lines) {
    const t = line.trim();
    if (!t || t.startsWith('#')) continue;
    return t;
  }
  return content.substring(0, 60);
}

// 渲染折叠态文件类型行
function renderCollapsedFiles(node) {
  const row = node.el.querySelector('.node-files-row');
  row.innerHTML = '';

  node.files.forEach(f => {
    const k = f.type === 'md' ? 'md' : 'image';

    const chip = document.createElement('span');

    chip.className = 'file-type-chip image';
    chip.innerHTML = '<span class="chip-icon"></span>IMG';

  const countEl = document.createElement('span');
  countEl.className = 'file-count';
  countEl.innerHTML = `<b>${node.files.length}</b> 个文件`;

// ========================================================
// 相机进入 / 退出节点（非弹窗，纯相机移动）
// ========================================================

// 进入节点：折叠当前聚焦节点 → 展开目标节点 → 相机聚焦
function enterNode(node) {
  // 折叠当前展开的节点（避免多个展开态重叠）
  if (currentFocusId !== null && currentFocusId !== node.id) {
    const prev = nodeData[currentFocusId];
    if (prev) collapseNode(prev);
  }
  // 展开目标节点
  node.expanded = true;
  node.el.classList.add('expanded', 'focused');
  renderExpandedContent(node); // 重新渲染（子节点可能已创建）
  currentFocusId = node.id;
  updateBreadcrumb();
  updateDepthStatus();
  updateConnections();
  // 相机平滑进入节点空间
  focusCameraOnNode(node);
  showToast('已进入：' + node.title);
}

// 折叠节点（返回折叠态）
function collapseNode(node) {
  node.expanded = false;
  node.el.classList.remove('expanded', 'focused');
}

// 退出到指定祖先节点（或根层）
function exitTo(targetNode) {
  // 折叠从当前 focus 到 target 之间的所有节点
  let id = currentFocusId;
  while (id !== null && id !== targetNode.id) {
    const n = nodeData[id];
    if (n) collapseNode(n);
    id = n ? n.parentId : null;
  }
  if (targetNode.parentId === null) {
    // 返回根层视图
    currentFocusId = null;
    updateBreadcrumb();
    updateDepthStatus();
    updateConnections();
    focusRootView();
    showToast('已返回根层');
  } else {
    // 聚焦到祖先节点
    targetNode.expanded = true;
    targetNode.el.classList.add('expanded', 'focused');
    renderExpandedContent(targetNode);
    currentFocusId = targetNode.id;
    updateBreadcrumb();
    updateDepthStatus();
    updateConnections();
    focusCameraOnNode(targetNode);
    showToast('已返回：' + targetNode.title);
  }
}

// 退出到上一层
function exitNode() {
  if (currentFocusId === null) return;
  const cur = nodeData[currentFocusId];
  if (!cur) return;
  if (cur.parentId === null) {
    // 已在根层节点，返回根层视图
    collapseNode(cur);
    currentFocusId = null;
    updateBreadcrumb();
    updateDepthStatus();
    updateConnections();
    focusRootView();
  } else {
    exitTo(nodeData[cur.parentId]);
  }
}

// ========================================================
// 面包屑导航
// ========================================================

// 生成当前聚焦路径（从根到当前节点）
function getBreadcrumbPath() {
  const path = [];
  let id = currentFocusId;
  // 收集从当前节点到根的链
  const chain = [];
  while (id !== null) {
    const n = nodeData[id];
    if (!n) break;
    chain.unshift(n);
    id = n.parentId;
  }
  // 根层"小说创作"始终作为第一项
  const root = nodeData[0];
  if (root) path.push(root);
  // 添加链中除根以外的节点
  chain.forEach(n => { if (n.id !== 0) path.push(n); });
  return path;
}

function updateBreadcrumb() {
  const path = getBreadcrumbPath();
  if (currentFocusId === null) {
    breadcrumbEl.classList.remove('show');
    return;
  }
  breadcrumbEl.classList.add('show');
  breadcrumbEl.innerHTML = '';

  // 返回上层按钮
  const backBtn = document.createElement('span');
  backBtn.className = 'crumb-back';
  backBtn.textContent = '← 返回';
  backBtn.addEventListener('click', exitNode);
  breadcrumbEl.appendChild(backBtn);

  path.forEach((n, i) => {
    if (i > 0) {
      const sep = document.createElement('span');
      sep.className = 'crumb-sep';
      sep.textContent = '›';
      breadcrumbEl.appendChild(sep);
    }
    const crumb = document.createElement('span');
    crumb.className = 'crumb' + (i === path.length - 1 ? ' current' : '');
    crumb.textContent = n.title;
    if (i < path.length - 1) {
      crumb.addEventListener('click', () => exitTo(n));
    }
    breadcrumbEl.appendChild(crumb);
  });
}

function updateDepthStatus() {
  if (currentFocusId === null) {
    depthLevelEl.textContent = '根层';
  } else {
    // 计算深度
    let depth = 0, id = currentFocusId;
    while (id !== null) {
      depth++;
      const n = nodeData[id];
      id = n ? n.parentId : null;
    }
    depthLevelEl.textContent = 'L' + depth;
  }
}

// ========================================================
// 连接线（折叠态节点之间的贝塞尔曲线）
// ========================================================

function updateConnections() {
  connectionsSvg.innerHTML = '';
  for (const id in nodeData) {
    const node = nodeData[id];
    if (node.parentId === null || node.parentId === undefined) continue;
    if (node.expanded) continue; // 展开态节点不画线
    const parent = nodeData[node.parentId];
    if (!parent || parent.expanded) continue; // 父展开时也不画
    drawConnection(parent, node);
  }
}

function drawConnection(parentNode, childNode) {
  const pw = parentNode.el.offsetWidth || 260;
  const ph = parentNode.el.offsetHeight || 150;
  const x1 = parentNode.x + pw;
  const y1 = parentNode.y + ph / 2;
  const ch = childNode.el.offsetHeight || 150;
  const x2 = childNode.x;
  const y2 = childNode.y + ch / 2;
  const dx = Math.max(40, Math.abs(x2 - x1) / 2);
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', '#a89e85');
  path.setAttribute('stroke-width', '2');
  path.setAttribute('stroke-dasharray', '5 3');
  connectionsSvg.appendChild(path);
}

// ========================================================
// 节点拖拽移动（拖头部）
// ========================================================

function startNodeDrag(e, node) {
  if (e.button !== 0) return;
  if (isAnimating) return;
  if (e.target.closest('.ne-exit')) return;
  e.preventDefault();
  e.stopPropagation();

  const startX = e.clientX, startY = e.clientY;
  let isDragging = false;
  const canvasRect = canvasArea.getBoundingClientRect();
  const worldX = (e.clientX - canvasRect.left - panX) / zoom;
  const worldY = (e.clientY - canvasRect.top - panY) / zoom;
  const offsetX = worldX - node.x;
  const offsetY = worldY - node.y;

  function onMove(ev) {
    if (!isDragging && (Math.abs(ev.clientX - startX) > 4 || Math.abs(ev.clientY - startY) > 4)) {
      isDragging = true;
      node.el.classList.add('dragging');
    }
    if (isDragging) {
      const wx = (ev.clientX - canvasRect.left - panX) / zoom;
      const wy = (ev.clientY - canvasRect.top - panY) / zoom;
      node.x = wx - offsetX;
      node.y = wy - offsetY;
      node.el.style.left = node.x + 'px';
      node.el.style.top = node.y + 'px';
      updateConnections();
    }
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    node.el.classList.remove('dragging');
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ========================================================
// 精细提问：选中文字 → 气泡菜单 → 提问框
// ========================================================

// 处理展开态文字选中
function handleTextSelection(e, node) {
  if (isAnimating) return;
  // 注意：必须在事件处理期间保存 currentTarget，
  // 因为进入 setTimeout 回调后 e.currentTarget 会被浏览器置为 null
  const container = e.currentTarget;
  setTimeout(() => {
    const sel = window.getSelection();
    const text = sel.toString().trim();
    if (text.length < 2) { hideBubble(); return; }
    // 确认选区在可选中文字内
    const range = sel.getRangeAt(0);
    if (!container || !container.contains(range.commonAncestorContainer)) { hideBubble(); return; }
    // 记录上下文
    const rect = range.getBoundingClientRect();
    askCtx = { text, node, rect };
    // 显示气泡菜单（定位在选区下方）
    let left = rect.left + rect.width / 2 - 60;
    left = Math.max(8, Math.min(left, window.innerWidth - 130));
    askBubble.style.left = left + 'px';
    askBubble.style.top = (rect.bottom + 8) + 'px';
    askBubble.classList.add('show');
  }, 10);
}

function hideBubble() {
  askBubble.classList.remove('show');
}

// 点击气泡 → 打开提问框
askBubble.addEventListener('click', () => {
  if (!askCtx) return;
  showAskPopup(askCtx);
  hideBubble();
});

// 显示提问框（紧贴选中文字定位）
function showAskPopup(ctx) {
  apContext.textContent = ctx.text;
  apQuestion.value = '';
  apReply.classList.remove('show');
  // 定位：选区下方偏左，处理边界
  const pw = 460, ph = 260;
  let left = ctx.rect.left;
  let top = ctx.rect.bottom + 12;
  if (left + pw > window.innerWidth - 12) left = window.innerWidth - pw - 12;
  if (left < 12) left = 12;
  if (top + ph > window.innerHeight - 12) top = ctx.rect.top - ph - 12;
  if (top < 70) top = 70;
  askPopup.style.left = left + 'px';
  askPopup.style.top = top + 'px';
  askPopup.classList.add('show');
  setTimeout(() => apQuestion.focus(), 60);
}

function hideAskPopup() {
  askPopup.classList.remove('show');
}

// 点击其他区域隐藏气泡/提问框
document.addEventListener('mousedown', (e) => {
  if (askBubble.classList.contains('show') && !askBubble.contains(e.target)) {
    if (!e.target.closest('.nfc-text')) hideBubble();
  }
  if (askPopup.classList.contains('show') && !askPopup.contains(e.target)) {
    if (!askBubble.contains(e.target)) hideAskPopup();
  }
});

// 发送提问
document.getElementById('apSend').addEventListener('click', () => {
  if (!askCtx) return;
  const q = apQuestion.value.trim();
  if (!q) return;
  // 加载状态
  apReply.classList.add('show', 'loading');
  apReply.querySelector('.reply-label').style.display = 'none';
  apReplyText.textContent = 'agent 正在查阅文件...';
  setTimeout(() => {
    apReply.classList.remove('loading');
    apReply.querySelector('.reply-label').style.display = '';
    apReplyText.textContent = generateAgentReply(q, askCtx.text, askCtx.node);
  }, 700);
});

document.getElementById('apCancel').addEventListener('click', hideAskPopup);
apQuestion.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('apSend').click();
  }
});

// ========================================================
// Agent 回复逻辑（关键词匹配）
// ========================================================

function generateAgentReply(question, context, node) {
  const q = (question + ' ' + context).toLowerCase();
  const ctxSnippet = context.length > 30 ? context.substring(0, 30) + '...' : context;

  // 共鸣术 / 共鸣
  if (q.includes('共鸣术') || q.includes('共鸣')) {
    return `关于「共鸣术」的设定：\n\n共鸣术是本作失传的能力——能感知物体的记忆和情感。林远觉醒的是失传的正统共鸣术，而赵无极则是隐藏的共鸣者，暗中收集共鸣文物追寻「共鸣之源」。\n\n你选中的"${ctxSnippet}"正是共鸣术体系的关键。北方铁冠帝国明令禁止共鸣术，这构成了主角与帝国的根本冲突。\n\n建议：在第10章「觉醒」中呼应共鸣术的完整传承，形成能力闭环。`;
  }

  // 银色徽章（伏笔）
  if (q.includes('银色徽章') || q.includes('徽章')) {
    return `关于「银色徽章」伏笔规划：\n\n这是第3章埋下的伏笔——林远首次任务时发现的神秘徽章，来源未解释。根据伏笔追踪文件，这是「待收伏笔」之一。\n\n你选中的"${ctxSnippet}"关联这条伏笔。规划建议：徽章可作为共鸣之源的线索载体，计划在第二卷揭示其与迷雾之地的联系。\n\n当前伏笔密度适中（每章约 0.4 个），可保持节奏。注意不要拖延太久才回收，否则读者会遗忘。`;
  }

  // 赵无极
  if (q.includes('赵无极') || q.includes('反派') || q.includes('宰相')) {
    return `关于「赵无极」的角色分析：\n\n赵无极，47岁，铁冠帝国宰相。出身寒门，靠权谋爬到权力顶峰。他的核心秘密是——隐藏的共鸣者，暗中收集共鸣文物，目标是找到「共鸣之源」获得永生。\n\n你选中的"${ctxSnippet}"涉及他的设定。他与林远的共鸣术同源，这是本作的核心戏剧张力：读者已知他的秘密，但主角林远尚不知情。\n\n建议：在第9章「遭遇」中埋下暗示，让主角逐步察觉异常。`;
  }

  // 林远
  if (q.includes('林远') || q.includes('主角')) {
    return `关于「林远」的角色设定：\n\n林远，23岁，共鸣师。来自边境小国琥珀镇的孤儿，自幼被铁匠收养。他觉醒了失传的共鸣术——能感知物体的记忆和情感。性格沉默寡言但内心炽热，对不公正的事无法坐视不管。\n\n你选中的"${ctxSnippet}"与他的身世或能力相关。\n\n成长弧线建议：从封闭孤儿 → 觉醒者 → 抗争者。第10章应让他完成真正的共鸣能力觉醒，呼应「共鸣之源」主线。`;
  }

  // 迷雾之地 / 共鸣之源
  if (q.includes('迷雾之地') || q.includes('共鸣之源') || q.includes('大陆') || q.includes('帝国') || q.includes('城邦')) {
    return `关于「世界观」的设定：\n\n三块大陆构成世界格局：\n- 北方·铁冠帝国（军事强权，禁止共鸣术）\n- 南方·自由城邦联盟（商业联邦，共鸣师庇护所）\n- 东方·迷雾之地（未探索，传说共鸣之源所在地）\n\n你选中的"${ctxSnippet}"涉及世界设定。迷雾之地作为共鸣之源的所在地，是整个故事的核心舞台。\n\n建议：第7章「梦境之城」作为伏笔，让林远梦见东方城市，为后续深入迷雾之地铺垫。`;
  }

  // 大纲 / 章节
  if (q.includes('大纲') || q.includes('章') || q.includes('觉醒') || q.includes('梦境')) {
    return `关于「第一卷大纲」的剧情结构：\n\n第一卷《觉醒》共 10 章，主线：发现共鸣 → 学院 → 觉醒能力。节奏上 1-3 章铺垫，4-6 章成长暗线，7-10 章冲突转折。\n\n你选中的"${ctxSnippet}"关联剧情节点。第7章「梦境之城」和第10章「觉醒」是关键转折——前者埋伏笔，后者收束第一卷能力线。\n\n建议：确保第10章觉醒与第3章银色徽章、第7章梦境之城形成呼应，形成首尾闭环。`;
  }

  // 伏笔
  if (q.includes('伏笔')) {
    return `关于「伏笔追踪」：\n\n当前待收伏笔 3 条：\n1. 第3章银色徽章——未解释来源\n2. 第7章梦境之城——未出现真实地点\n3. 赵无极的秘密——读者已知但主角不知\n\n你选中的"${ctxSnippet}"关联伏笔管理。其中第3条是「信息差」型伏笔，戏剧张力最强，建议在第二卷让主角逐步发现。\n\n风险提示：不要同时回收太多伏笔，保持悬念递进。`;
  }

  // 默认回复
  return `我查阅了「${node.title}」节点下的文件内容。\n\n针对你的问题"${question}"${context ? '，结合选中的"' + ctxSnippet + '"' : ''}：这部分内容属于小说创作项目的核心设定。\n\n你可以尝试选中更具体的关键词（如「共鸣术」「银色徽章」「赵无极」「迷雾之地」等），我会基于设定文件给出更精准的解读与创作建议。`;
}

// ========================================================
// Toast 提示
// ========================================================

function showToast(text) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = text;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1400);
}

// ========================================================
// 工具栏
// ========================================================

document.getElementById('zoomInBtn').addEventListener('click', () => {
  zoom = Math.min(2.5, zoom * 1.2);
  applyTransform();
});
document.getElementById('zoomOutBtn').addEventListener('click', () => {
  zoom = Math.max(0.25, zoom * 0.8);
  applyTransform();
});
document.getElementById('resetViewBtn').addEventListener('click', () => {
  if (currentFocusId !== null) {
    // 重新聚焦当前节点
    focusCameraOnNode(nodeData[currentFocusId]);
  } else {
    focusRootView();
  }
  showToast('已重置视图');
});

// ========================================================
// ESC 返回上层
// ========================================================

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (askPopup.classList.contains('show')) {
      hideAskPopup();
    } else if (currentFocusId !== null) {
      exitNode();
    }
  }
});

// ========================================================
// 初始化
// ========================================================

function updateCounter() {
  nodeCountEl.textContent = Object.keys(nodeData).length;
}

function init() {
  // 创建所有初始节点
  initialData.forEach(data => createNode(data));
  // 重新渲染所有节点的展开态（此时子节点已全部创建）
  for (const id in nodeData) renderExpandedContent(nodeData[id]);

  setupPanZoom();
  updateCounter();
  updateDepthStatus();

  // 等待布局完成后相机俯瞰所有节点
  requestAnimationFrame(() => {
    updateConnections();
    focusRootView();
  });
}

init();
</script>
