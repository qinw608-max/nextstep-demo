<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent 协作 · 像素画布</title>
<!-- 共享设计语言：像素字体 + 配色变量 -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
:root {
  --bg: #f0ebe0; --bg-canvas: #e8e2d4; --bg-panel: #faf7f0;
  --bg-card: #ffffff; --bg-card-hi: #f5f1e8;
  --primary: #4a7c9e; --primary-dim: #6b9bb8; --primary-bg: #e3edf3;
  --success: #5b8c5a; --success-bg: #e8f0e8;
  --warning: #c4944a; --warning-bg: #f5edd9;
  --asset: #8b6fb0; --asset-bg: #ede8f5;
  --text: #3d3d3d; --text-dim: #8a8a8a; --text-hi: #1a1a1a;
  --border: #c9c2b0; --border-hi: #a89e85; --shadow: #d4cdb9;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'VT323', monospace;
  background: var(--bg); color: var(--text); font-size: 18px;
  user-select: none; -webkit-user-select: none;
}

/* ===== 顶部标题栏 ===== */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 60px;
  background: var(--bg-panel); border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 14px; padding: 0 20px;
}
.brand { display: flex; flex-direction: column; gap: 3px; }
.brand .title { font-family: 'Press Start 2P', monospace; font-size: 14px; color: var(--text-hi); letter-spacing: 0.5px; }
.brand .desc { font-size: 17px; color: var(--text-dim); }
.topbar .spacer { flex: 1; }
.status-online {
  font-family: 'Press Start 2P', monospace; font-size: 9px;
  padding: 7px 11px; border: 2px solid var(--success); background: var(--success-bg); color: var(--success);
  display: flex; align-items: center; gap: 8px;
}
.status-online .dot { width: 8px; height: 8px; background: var(--success); animation: blink 1.2s steps(2) infinite; }
@keyframes blink { 50% { opacity: 0.25; } }

/* ===== 主体分屏 ===== */
.main { position: fixed; top: 60px; left: 0; right: 0; bottom: 0; display: flex; }

/* ===== 左侧 Agent 对话 ===== */
.chat {
  width: 38%; min-width: 320px; max-width: 460px;
  background: var(--bg-panel); border-right: 2px solid var(--border);
  display: flex; flex-direction: column;
}
.chat-head {
  padding: 12px 16px; border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.chat-head .avatar {
  width: 34px; height: 34px; background: var(--asset); border: 2px solid var(--border-hi);
  box-shadow: 3px 3px 0 0 var(--shadow);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Press Start 2P', monospace; font-size: 10px; color: #fff;
}
.chat-head .meta { display: flex; flex-direction: column; gap: 2px; }
.chat-head .name { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--text-hi); }
.chat-head .sub { font-size: 15px; color: var(--text-dim); }

.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.messages::-webkit-scrollbar { width: 8px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); }

.msg { display: flex; gap: 8px; max-width: 92%; animation: msgIn 0.2s steps(4); }
@keyframes msgIn { 0% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; transform: translateY(0); } }
.msg.agent { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg .bubble {
  padding: 9px 12px; border: 2px solid var(--border); background: var(--bg-card);
  box-shadow: 3px 3px 0 0 var(--shadow); font-size: 17px; line-height: 1.3; color: var(--text);
  word-break: break-word;
}
.msg.agent .bubble { border-color: var(--asset); background: var(--asset-bg); }
.msg.user .bubble { border-color: var(--primary); background: var(--primary-bg); }
.msg .bubble .quote {
  font-size: 15px; color: var(--text-dim); border-left: 3px solid var(--border-hi);
  padding: 2px 8px; margin-bottom: 6px; background: rgba(0,0,0,0.03);
  font-style: italic;
}
.msg .bubble .who { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--text-dim); margin-bottom: 4px; }

/* 同步中指示器 */
.typing { display: flex; gap: 8px; align-self: flex-start; }
.typing .bubble { padding: 12px 14px; border: 2px solid var(--asset); background: var(--asset-bg); box-shadow: 3px 3px 0 0 var(--shadow); display: flex; gap: 5px; }
.typing .dot { width: 7px; height: 7px; background: var(--asset); animation: typing 1s steps(4) infinite; }
.typing .dot:nth-child(2) { animation-delay: 0.15s; }
.typing .dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes typing { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

.composer { border-top: 2px solid var(--border); padding: 10px 12px; display: flex; gap: 8px; }
.composer input {
  flex: 1; padding: 9px 10px; border: 2px solid var(--border); background: var(--bg-card);
  font-family: 'VT323', monospace; font-size: 17px; color: var(--text); outline: none;
}
.composer input:focus { border-color: var(--primary); }
.composer .send {
  padding: 0 14px; border: 2px solid var(--primary); background: var(--primary-bg);
  font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--primary); cursor: pointer;
}
.composer .send:hover { background: #d6e6ef; }
.composer-hint { font-size: 14px; color: var(--text-dim); padding: 0 12px 8px; }

/* ===== 右侧画布 ===== */
.canvas-wrap { flex: 1; position: relative; background: var(--bg-canvas); }
.canvas-bar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  padding: 10px 16px; display: flex; align-items: center; gap: 12px;
  background: linear-gradient(var(--bg-panel), rgba(250,247,240,0.6));
  border-bottom: 1px dashed var(--border);
}
.canvas-bar .ctitle { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--text-hi); }
.canvas-bar .ccount { font-size: 15px; color: var(--text-dim); }
.canvas-bar .spacer { flex: 1; }
.zoom-mini { display: flex; gap: 4px; }
.zoom-mini button {
  width: 28px; height: 26px; border: 2px solid var(--border); background: var(--bg-card);
  font-family: 'Press Start 2P', monospace; font-size: 9px; cursor: pointer; color: var(--text);
}
.zoom-mini button:hover { background: var(--bg-card-hi); }

.viewport { position: absolute; top: 50px; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; }
.viewport.panning { cursor: grabbing; }
.world {
  position: absolute; top: 0; left: 0; width: 3000px; height: 2200px; transform-origin: 0 0;
  background-color: var(--bg-canvas);
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px),
    linear-gradient(rgba(201,194,176,0.35) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,194,176,0.35) 1px, transparent 1px);
  background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
}

/* 节点 */
.node {
  position: absolute; width: 240px; background: var(--bg-card);
  border: 2px solid var(--border); box-shadow: 4px 4px 0 0 var(--shadow);
  transition: box-shadow 0.1s;
}
.node:hover { box-shadow: 6px 6px 0 0 var(--shadow); }
.node-head {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  border-bottom: 2px solid var(--border); cursor: grab;
}
.node-head:active { cursor: grabbing; }
.node .tag { width: 9px; height: 9px; flex: 0 0 9px; }
.node.status-doing .tag { background: var(--primary); animation: blink 1.2s steps(2) infinite; }
.node.status-todo .tag { background: var(--text-dim); }
.node.status-done .tag { background: var(--success); }
.node .title { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--text-hi); flex: 1; }
.node .grab-hint { font-size: 13px; color: var(--text-dim); }
.node-body { padding: 8px 10px; font-size: 17px; line-height: 1.4; color: var(--text); user-select: text; -webkit-user-select: text; cursor: text; }
.node-body .line { padding: 2px 0; }
.node-body .line.lead { color: var(--text-dim); }
.node-body .agent-line {
  margin-top: 6px; padding: 5px 8px; background: var(--asset-bg); border-left: 3px solid var(--asset);
  font-size: 16px; color: var(--asset); animation: lineIn 0.3s steps(5);
  display: flex; gap: 6px; align-items: flex-start;
}
@keyframes lineIn { 0% { opacity: 0; transform: translateX(-6px); } 100% { opacity: 1; transform: translateX(0); } }
.node-body .agent-line .ico { font-family: 'Press Start 2P', monospace; font-size: 7px; flex: 0 0 auto; }

/* 更新高亮动画 */
.node.updated { animation: nodeFlash 1.1s steps(8); }
@keyframes nodeFlash {
  0%,100% { border-color: var(--border); box-shadow: 4px 4px 0 0 var(--shadow); }
  25% { border-color: var(--success); box-shadow: 4px 4px 0 0 var(--success), 0 0 0 3px var(--success-bg); }
  50% { border-color: var(--success); }
  75% { border-color: var(--success); box-shadow: 4px 4px 0 0 var(--success); }
}

/* 新建节点入场 */
.node.spawning { animation: spawnIn 0.45s steps(6); }
@keyframes spawnIn {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.06); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* ===== 选中文字浮动菜单 ===== */
.sel-menu {
  position: fixed; z-index: 200; display: none;
  background: var(--bg-card); border: 2px solid var(--asset); box-shadow: 3px 3px 0 0 var(--shadow);
  padding: 0;
}
.sel-menu button {
  display: flex; align-items: center; gap: 6px; padding: 8px 12px;
  border: none; background: var(--bg-card); cursor: pointer;
  font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--asset);
  white-space: nowrap;
}
.sel-menu button:hover { background: var(--asset-bg); }
.sel-menu button .arr { color: var(--text-dim); }

/* ===== 提问 modal ===== */
.modal-mask {
  position: fixed; inset: 0; z-index: 300; background: rgba(61,61,61,0.35);
  display: none; align-items: center; justify-content: center;
}
.modal-mask.show { display: flex; animation: fadeIn 0.15s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  width: 460px; max-width: 92vw; background: var(--bg-panel);
  border: 2px solid var(--border-hi); box-shadow: 6px 6px 0 0 var(--shadow);
  animation: modalIn 0.18s steps(4);
}
@keyframes modalIn { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.modal-head { padding: 12px 16px; border-bottom: 2px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-head .t { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--text-hi); }
.modal-head .x { border: none; background: var(--bg-card); width: 22px; height: 22px; cursor: pointer; font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--text-dim); }
.modal-body { padding: 14px 16px; }
.ctx-box {
  background: var(--asset-bg); border: 2px solid var(--asset); padding: 9px 11px; margin-bottom: 12px;
}
.ctx-box .lbl { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--asset); margin-bottom: 4px; }
.ctx-box .from { font-size: 14px; color: var(--text-dim); margin-bottom: 4px; }
.ctx-box .text { font-size: 17px; color: var(--text-hi); line-height: 1.3; font-style: italic; }
.modal-body textarea {
  width: 100%; height: 70px; resize: none; padding: 9px 11px;
  border: 2px solid var(--border); background: var(--bg-card);
  font-family: 'VT323', monospace; font-size: 17px; color: var(--text); outline: none;
}
.modal-body textarea:focus { border-color: var(--primary); }
.quick { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.quick button {
  padding: 4px 8px; border: 1px solid var(--border); background: var(--bg-card);
  font-family: 'VT323', monospace; font-size: 15px; color: var(--text-dim); cursor: pointer;
}
.quick button:hover { border-color: var(--primary); color: var(--primary); }
.modal-foot { padding: 10px 16px; border-top: 2px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.modal-foot button { padding: 9px 16px; border: 2px solid var(--border); background: var(--bg-card); font-family: 'Press Start 2P', monospace; font-size: 8px; cursor: pointer; color: var(--text); }
.modal-foot .primary { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); }
.modal-foot .primary:hover { background: #d6e6ef; }

/* ===== 右下角悬浮按钮 ===== */
.fab {
  position: fixed; right: 24px; bottom: 24px; z-index: 110;
  display: flex; align-items: center; gap: 8px;
  padding: 13px 16px; background: var(--asset); border: 2px solid var(--border-hi);
  box-shadow: 4px 4px 0 0 var(--shadow); cursor: pointer;
  font-family: 'Press Start 2P', monospace; font-size: 9px; color: #fff;
  transition: transform 0.1s;
}
.fab:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 0 var(--shadow); }
.fab .plus { font-size: 12px; }

.hint {
  position: fixed; left: 24px; bottom: 24px; z-index: 90;
  background: var(--bg-panel); border: 2px solid var(--border); box-shadow: 3px 3px 0 0 var(--shadow);
  padding: 8px 14px; font-size: 16px; color: var(--text-dim);
  display: flex; align-items: center; gap: 8px; max-width: 60vw;
}
.hint .key { font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 3px 5px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text); }
</style>
</head>
<body>

<!-- 顶部标题栏 -->
<div class="topbar">
  <div class="brand">
    <div class="title">AGENT COLLAB</div>
    <div class="desc">Agent 协作 — 选中节点文字向 Agent 提问，回复自动写回画布</div>
  </div>
  <div class="spacer"></div>
  <div class="status-online"><span class="dot"></span>AGENT ONLINE</div>
</div>

<div class="main">
  <!-- 左侧对话 -->
  <aside class="chat">
    <div class="chat-head">
      <div class="avatar">A</div>
      <div class="meta">
        <span class="name">PIXEL AGENT</span>
        <span class="sub">画布协作助手 · 在线</span>
      </div>
    </div>
    <div class="messages" id="messages">
      <!-- 初始消息由 JS 注入 -->
    </div>
    <div class="composer">
      <input id="quickInput" type="text" placeholder="或直接发消息给 agent…" />
      <button class="send" id="quickSend">发送</button>
    </div>
    <div class="composer-hint">提示：在右侧节点上选中一段文字，会弹出"向 agent 提问"。</div>
  </aside>

  <!-- 右侧画布 -->
  <section class="canvas-wrap">
    <div class="canvas-bar">
      <span class="ctitle">CANVAS</span>
      <span class="ccount" id="nodeCount">3 个任务节点</span>
      <span class="spacer"></span>
      <div class="zoom-mini">
        <button id="zOut">－</button>
        <button id="zReset">◎</button>
        <button id="zIn">＋</button>
      </div>
    </div>
    <div class="viewport" id="viewport">
      <div class="world" id="world">
        <!-- 节点由 JS 注入 -->
      </div>
    </div>
  </section>
</div>

<!-- 选中文字浮动菜单 -->
<div class="sel-menu" id="selMenu">
  <button id="askAgent"><span>向 agent 提问</span><span class="arr">▸</span></button>
</div>

<!-- 提问 modal -->
<div class="modal-mask" id="modalMask">
  <div class="modal">
    <div class="modal-head">
      <span class="t">向 AGENT 提问</span>
      <button class="x" id="modalClose">×</button>
    </div>
    <div class="modal-body">
      <div class="ctx-box">
        <div class="lbl">选中上下文</div>
        <div class="from" id="ctxFrom">— 来自节点 —</div>
        <div class="text" id="ctxText">“…”</div>
      </div>
      <textarea id="questionInput" placeholder="输入你的问题，例如：这步大概要多久？有什么风险？"></textarea>
      <div class="quick">
        <button data-q="这步大概需要多久？">这步需要多久？</button>
        <button data-q="有哪些风险？">有哪些风险？</button>
        <button data-q="依赖什么前置任务？">依赖什么？</button>
        <button data-q="有没有更好的方案？">更好的方案？</button>
      </div>
    </div>
    <div class="modal-foot">
      <button id="modalCancel">取消</button>
      <button class="primary" id="modalSend">发送给 agent</button>
    </div>
  </div>
</div>

<!-- 右下角新建节点按钮 -->
<button class="fab" id="fabNew"><span class="plus">＋</span><span>让 agent 新建节点</span></button>

<!-- 底部提示 -->
<div class="hint">
  <span>选中节点文字</span><span class="key">提问</span>
  <span>拖节点头部</span><span class="key">移动</span>
  <span>拖空白</span><span class="key">平移</span>
</div>

<script>
/* ============================================================
   Agent 协作 demo 逻辑
   - 左侧对话窗 + 右侧画布（3 节点）
   - 选中节点文字 → 浮动菜单"向 agent 提问"
   - 提问框：显示上下文 + 输入问题 → 发送
   - 对话窗：用户消息 + 同步中动画 + 1.5s 后 agent 回复
   - 回复按关键词匹配（预设 4 种）
   - 画布节点自动追加更新行 + 高亮动画
   - 右下角按钮：agent 自动新建节点到画布
   - 画布平移缩放 + 节点拖拽
   ============================================================ */

const messagesEl = document.getElementById('messages');
const viewport = document.getElementById('viewport');
const world = document.getElementById('world');
const selMenu = document.getElementById('selMenu');
const askAgentBtn = document.getElementById('askAgent');
const modalMask = document.getElementById('modalMask');
const ctxFrom = document.getElementById('ctxFrom');
const ctxText = document.getElementById('ctxText');
const questionInput = document.getElementById('questionInput');
const nodeCountEl = document.getElementById('nodeCount');

// 画布状态
const state = { tx: 80, ty: 40, scale: 1, nodes: [], seq: 0 };

// 3 个任务节点初始数据
const initialNodes = [
  { id: 'n1', x: 120, y: 90, title: '需求调研', status: 'done',
    lines: ['明确核心场景：登录、首页、个人中心。', '识别三类用户角色：访客 / 普通 / 管理。'] },
  { id: 'n2', x: 470, y: 230, title: '原型设计', status: 'doing',
    lines: ['低保真原型覆盖主流程，已评审一轮。', '交互细节与边界态待补充。'] },
  { id: 'n3', x: 820, y: 110, title: '前端开发', status: 'todo',
    lines: ['技术选型：React + Vite。', '组件库选型待定，倾向轻量方案。'] },
];

// 预设 agent 回复（关键词匹配）
const replyRules = [
  { keys: ['多久','时间','工期','排期','几天','周期','耗时'], text: '根据当前依赖关系，建议预留 2 个工作日。可把后续节点截止日顺延。', tag: '排期建议' },
  { keys: ['风险','问题','隐患','坑','担心'], text: '主要风险在前后端联调与接口稳定性，建议提前约定 Mock 并做契约测试。', tag: '风险评估' },
  { keys: ['依赖','前置','需要','阻塞','前提'], text: '该任务依赖上游产出，需先确认信息架构与接口契约再开工。', tag: '依赖梳理' },
  { keys: ['方案','怎么做','如何','思路','更好','优化'], text: '推荐分两步：先做低保真评审，再细化交互；可复用组件库降本。', tag: '方案建议' },
];
const defaultReply = { text: '已记录你的问题，我会结合画布上下文持续跟踪，必要时拆解为子任务。', tag: '已记录' };

function matchReply(q) {
  for (const r of replyRules) {
    if (r.keys.some(k => q.includes(k))) return r;
  }
  return defaultReply;
}

// ---------- 初始化节点 ----------
function initNodes() {
  initialNodes.forEach(d => createNode(d, false));
}

function createNode(d, spawn) {
  const el = document.createElement('div');
  el.className = 'node status-' + d.status + (spawn ? ' spawning' : '');
  el.style.left = d.x + 'px';
  el.style.top = d.y + 'px';
  el.dataset.id = d.id;
  el.innerHTML = `
    <div class="node-head"><span class="tag"></span><span class="title">${d.title}</span><span class="grab-hint">⋮⋮</span></div>
    <div class="node-body"></div>
  `;
  const body = el.querySelector('.node-body');
  d.lines.forEach((t, i) => {
    const ln = document.createElement('div');
    ln.className = 'line' + (i === 0 ? ' lead' : '');
    ln.textContent = t;
    body.appendChild(ln);
  });
  world.appendChild(el);
  const n = { ...d, el, w: 240, h: 0 };
  state.nodes.push(n);
  requestAnimationFrame(() => { n.h = el.offsetHeight; });
  // 节点内文字可选中
  body.addEventListener('mouseup', onNodeSelection);
  // 拖拽头部
  el.querySelector('.node-head').addEventListener('mousedown', (e) => onDragStart(e, n));
  if (spawn) setTimeout(() => el.classList.remove('spawning'), 500);
  updateNodeCount();
  return n;
}

function updateNodeCount() {
  nodeCountEl.textContent = state.nodes.length + ' 个任务节点';
}

// ---------- 选中文字 → 浮动菜单 ----------
let currentSelection = null; // { text, nodeId, nodeTitle }
function onNodeSelection(e) {
  const sel = window.getSelection();
  const text = sel.toString().trim();
  // 隐藏旧菜单
  if (!text) { selMenu.style.display = 'none'; return; }
  const nodeEl = e.target.closest('.node');
  if (!nodeEl) { selMenu.style.display = 'none'; return; }
  const n = state.nodes.find(x => x.id === nodeEl.dataset.id);
  if (!n) return;
  currentSelection = { text, nodeId: n.id, nodeTitle: n.title };
  // 定位菜单到选区下方
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  selMenu.style.display = 'block';
  selMenu.style.left = (rect.left + rect.width / 2 - 70) + 'px';
  selMenu.style.top = (rect.bottom + 8) + 'px';
}

// 点击别处隐藏菜单
document.addEventListener('mousedown', (e) => {
  if (!selMenu.contains(e.target)) {
    if (!e.target.closest('.node-body')) selMenu.style.display = 'none';
  }
});

// ---------- 提问 modal ----------
askAgentBtn.addEventListener('click', () => {
  if (!currentSelection) return;
  ctxFrom.textContent = '— 来自节点：' + currentSelection.nodeTitle + ' —';
  ctxText.textContent = '“' + currentSelection.text + '”';
  questionInput.value = '';
  modalMask.classList.add('show');
  selMenu.style.display = 'none';
  setTimeout(() => questionInput.focus(), 60);
});
document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalCancel').onclick = closeModal;
function closeModal() { modalMask.classList.remove('show'); }
modalMask.addEventListener('mousedown', (e) => { if (e.target === modalMask) closeModal(); });

// 快捷问题
document.querySelectorAll('.quick button').forEach(b => {
  b.onclick = () => { questionInput.value = b.dataset.q; questionInput.focus(); };
});

// 发送给 agent
document.getElementById('modalSend').onclick = sendQuestion;
questionInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) sendQuestion(); });

function sendQuestion() {
  const q = questionInput.value.trim();
  if (!q) { questionInput.focus(); return; }
  if (!currentSelection) { closeModal(); return; }
  const sel = currentSelection;
  closeModal();
  // 清除浏览器选区
  window.getSelection().removeAllRanges();
  // 添加用户消息（含上下文引用）
  addUserMessage(q, sel);
  // 同步中动画
  const typing = addTyping();
  // 1.5s 后回复
  setTimeout(() => {
    typing.remove();
    const reply = matchReply(q);
    addAgentMessage(reply.text);
    // 写回节点 + 高亮
    appendAgentLineToNode(sel.nodeId, reply.tag, reply.text);
  }, 1500);
}

// ---------- 对话消息 ----------
function addMessage(html, who) {
  const msg = document.createElement('div');
  msg.className = 'msg ' + who;
  msg.innerHTML = `<div class="bubble">${html}</div>`;
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return msg;
}
function addUserMessage(q, sel) {
  const html = `
    <div class="who">YOU</div>
    <div class="quote">引用「${sel.nodeTitle}」：${escapeHtml(sel.text)}</div>
    <div>${escapeHtml(q)}</div>
  `;
  return addMessage(html, 'user');
}
function addAgentMessage(text) {
  const html = `<div class="who">PIXEL AGENT</div><div>${escapeHtml(text)}</div>`;
  return addMessage(html, 'agent');
}
function addTyping() {
  const t = document.createElement('div');
  t.className = 'msg agent typing';
  t.innerHTML = `<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  messagesEl.appendChild(t);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return t;
}

function escapeHtml(s) {
  return s.replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
}

// ---------- 写回节点 + 高亮 ----------
function appendAgentLineToNode(nodeId, tag, text) {
  const n = state.nodes.find(x => x.id === nodeId);
  if (!n) return;
  const body = n.el.querySelector('.node-body');
  const line = document.createElement('div');
  line.className = 'agent-line';
  line.innerHTML = `<span class="ico">[${tag}]</span><span>${escapeHtml(text)}</span>`;
  body.appendChild(line);
  // 高亮动画
  n.el.classList.remove('updated');
  void n.el.offsetWidth;
  n.el.classList.add('updated');
  setTimeout(() => n.el.classList.remove('updated'), 1200);
  // 更新高度
  requestAnimationFrame(() => { n.h = n.el.offsetHeight; });
}

// ---------- 快速输入栏（不依赖选中） ----------
const quickInput = document.getElementById('quickInput');
const quickSend = document.getElementById('quickSend');
function quickSubmit() {
  const q = quickInput.value.trim();
  if (!q) return;
  quickInput.value = '';
  addMessage(`<div class="who">YOU</div><div>${escapeHtml(q)}</div>`, 'user');
  const typing = addTyping();
  setTimeout(() => {
    typing.remove();
    const reply = matchReply(q);
    addAgentMessage(reply.text);
    // 快速提问默认写到第一个节点
    const n = state.nodes[0];
    if (n) appendAgentLineToNode(n.id, reply.tag, reply.text);
  }, 1500);
}
quickSend.onclick = quickSubmit;
quickInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') quickSubmit(); });

// ---------- 右下角：让 agent 新建节点 ----------
const newTitles = [
  { title: '接口联调', status: 'todo', lines: ['与后端约定接口契约。', 'Mock 数据先行。'] },
  { title: '性能优化', status: 'todo', lines: ['首屏加载 < 1.5s。', '图片懒加载与分包。'] },
  { title: '埋点验收', status: 'todo', lines: ['核心路径埋点核对。', '漏斗数据回收。'] },
  { title: '灰度发布', status: 'todo', lines: ['按 5% → 30% → 100% 灰度。', '监控阈值配置。'] },
];
let newIdx = 0;
document.getElementById('fabNew').onclick = () => {
  const tpl = newTitles[newIdx % newTitles.length];
  newIdx++;
  addMessage(`<div class="who">YOU</div><div>帮我在画布上新建一个节点：${tpl.title}</div>`, 'user');
  const typing = addTyping();
  setTimeout(() => {
    typing.remove();
    // 在已有节点附近放置新节点
    const last = state.nodes[state.nodes.length - 1];
    const x = (last ? last.x : 100) + 320;
    const y = (last ? last.y : 100) + (Math.random() * 60 - 30);
    const id = 'g-' + (++state.seq);
    const n = createNode({ id, x, y, title: tpl.title, status: tpl.status, lines: tpl.lines }, true);
    // 高亮
    setTimeout(() => { n.el.classList.add('updated'); setTimeout(() => n.el.classList.remove('updated'), 1200); }, 450);
    addAgentMessage(`已在画布创建节点「${tpl.title}」，并接入当前流程。你可以拖动调整它的位置。`);
  }, 1200);
};

// ---------- 画布变换 ----------
function applyTransform() {
  world.style.transform = `translate(${state.tx}px, ${state.ty}px) scale(${state.scale})`;
}
applyTransform();
function screenToWorld(cx, cy) {
  const r = viewport.getBoundingClientRect();
  return { x: (cx - r.left - state.tx) / state.scale, y: (cy - r.top - state.ty) / state.scale };
}

// 平移
let panState = null;
viewport.addEventListener('mousedown', (e) => {
  if (e.target.closest('.node') || e.target.closest('.canvas-bar') || e.target.closest('.fab') || e.target.closest('.hint')) return;
  panState = { sx: e.clientX, sy: e.clientY, otx: state.tx, oty: state.ty };
  viewport.classList.add('panning');
});
window.addEventListener('mousemove', (e) => {
  if (!panState) return;
  state.tx = panState.otx + (e.clientX - panState.sx);
  state.ty = panState.oty + (e.clientY - panState.sy);
  applyTransform();
});
window.addEventListener('mouseup', () => { if (panState) { viewport.classList.remove('panning'); panState = null; } });

// 缩放
viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  const f = e.deltaY > 0 ? 0.9 : 1.1;
  let ns = Math.max(0.4, Math.min(2.2, state.scale * f));
  const r = viewport.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  state.tx = mx - (mx - state.tx) * (ns / state.scale);
  state.ty = my - (my - state.ty) * (ns / state.scale);
  state.scale = ns;
  applyTransform();
}, { passive: false });

document.getElementById('zIn').onclick = () => zoomBy(1.2);
document.getElementById('zOut').onclick = () => zoomBy(1 / 1.2);
document.getElementById('zReset').onclick = () => { state.tx = 80; state.ty = 40; state.scale = 1; applyTransform(); };
function zoomBy(f) {
  const r = viewport.getBoundingClientRect();
  const cx = r.width / 2, cy = r.height / 2;
  let ns = Math.max(0.4, Math.min(2.2, state.scale * f));
  state.tx = cx - (cx - state.tx) * (ns / state.scale);
  state.ty = cy - (cy - state.ty) * (ns / state.scale);
  state.scale = ns;
  applyTransform();
}

// ---------- 节点拖拽 ----------
function onDragStart(e, item) {
  if (e.button !== 0) return;
  e.preventDefault();
  const start = screenToWorld(e.clientX, e.clientY);
  const ox = item.x, oy = item.y;
  function onMove(ev) {
    const w = screenToWorld(ev.clientX, ev.clientY);
    item.x = ox + (w.x - start.x);
    item.y = oy + (w.y - start.y);
    item.el.style.left = item.x + 'px';
    item.el.style.top = item.y + 'px';
  }
  function onUp() {
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
  }
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
}

// ---------- 启动 ----------
initNodes();
// 初始欢迎消息
addAgentMessage('你好，我是 Pixel Agent。在右侧画布选中一段文字，就能向我提问；我也会把结论写回对应节点。');
</script>
</body>
</html>
