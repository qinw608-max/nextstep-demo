<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双向同步 — SYNC</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
:root {
  --bg: #f0ebe0; --bg-canvas: #e8e2d4; --bg-panel: #faf7f0;
  --bg-card: #ffffff; --bg-card-hi: #f5f1e8;
  --primary: #4a7c9e; --primary-dim: #6b9bb8; --primary-bg: #e3edf3;
  --success: #5b8c5a; --success-bg: #e8f0e8;
  --warning: #c4944a; --warning-bg: #f5edd9;
  --asset: #8b6fb0; --asset-bg: #ede8f5;
  --text: #3d3d3d; --text-dim: #8a8a8a; --text-hi: #1a1a1a;
  --border: #c9c2b0; --border-hi: #a89e85; --shadow: #d4cdb9;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family:'VT323',monospace; font-size:18px;
  background:var(--bg); color:var(--text); user-select:none;
}

/* ===== 顶栏 ===== */
.topbar {
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:56px; background:var(--bg-panel);
  border-bottom:3px solid var(--border-hi); box-shadow:0 3px 0 var(--shadow);
  display:flex; align-items:center; gap:14px; padding:0 20px;
}
.sync-indicator { display:flex; align-items:center; gap:8px; }
.sync-dot {
  width:12px; height:12px; background:var(--success);
  animation:sync-pulse 1.5s ease-in-out infinite;
}
@keyframes sync-pulse {
  0%,100% { box-shadow:0 0 0 0 rgba(91,140,90,.6); }
  50% { box-shadow:0 0 0 8px rgba(91,140,90,0); }
}
.sync-indicator.flash .sync-dot { animation:sync-flash .5s ease 2; }
@keyframes sync-flash {
  0%,100% { background:var(--success); transform:scale(1); }
  50% { background:var(--primary); transform:scale(1.6); }
}
.sync-text { font-family:'Press Start 2P',monospace; font-size:11px; color:var(--success); }
.topbar .title { font-family:'Press Start 2P',monospace; font-size:13px; color:var(--text-hi); }
.topbar .desc { font-size:17px; color:var(--text-dim); }
.topbar .spacer { flex:1; }
.replay-btn {
  font-family:'Press Start 2P',monospace; font-size:10px; color:#fff;
  background:var(--text-hi); border:3px solid var(--text-hi); padding:10px 14px;
  cursor:pointer; box-shadow:4px 4px 0 var(--shadow); transition:transform .1s;
}
.replay-btn:hover { transform:translate(2px,2px); box-shadow:2px 2px 0 var(--shadow); }
.replay-btn:active { transform:translate(4px,4px); box-shadow:0 0 0 var(--shadow); }

/* ===== 主布局 ===== */
.main {
  position:fixed; top:56px; left:0; right:0; bottom:0;
  display:flex;
}

/* ===== 左侧对话 ===== */
.chat-panel {
  width:380px; flex-shrink:0;
  background:var(--bg-panel); border-right:3px solid var(--border-hi);
  display:flex; flex-direction:column;
}
.chat-header {
  padding:10px 16px; border-bottom:2px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.chat-title { font-family:'Press Start 2P',monospace; font-size:11px; color:var(--text-hi); }
.chat-status {
  font-size:14px; color:var(--success); margin-left:auto;
  display:flex; align-items:center; gap:4px;
}
.chat-status::before { content:''; width:8px; height:8px; background:var(--success); }
.chat-messages {
  flex:1; overflow-y:auto; padding:16px;
  display:flex; flex-direction:column; gap:10px;
}
.chat-messages::-webkit-scrollbar { width:8px; }
.chat-messages::-webkit-scrollbar-thumb { background:var(--border-hi); }
.chat-msg { display:flex; gap:8px; animation:msg-in .3s ease; max-width:100%; }
.chat-msg.user { flex-direction:row-reverse; }
@keyframes msg-in { from { opacity:0; transform:translateY(10px); } }
.chat-avatar {
  width:32px; height:32px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Press Start 2P',monospace; font-size:9px; color:#fff;
}
.chat-msg.agent .chat-avatar { background:var(--primary); }
.chat-msg.user .chat-avatar { background:var(--asset); }
.chat-bubble {
  max-width:260px; padding:8px 12px; font-size:16px; line-height:1.4;
  border:2px solid var(--border-hi); word-break:break-word;
}
.chat-msg.agent .chat-bubble { background:var(--bg-card); box-shadow:3px 3px 0 var(--shadow); }
.chat-msg.user .chat-bubble { background:var(--asset-bg); text-align:right; box-shadow:-3px 3px 0 var(--shadow); }
.chat-msg.agent.sync-confirm .chat-bubble { border-color:var(--success); background:var(--success-bg); }
.typing-indicator {
  display:flex; gap:4px; padding:10px 14px;
  background:var(--bg-card); border:2px solid var(--border-hi);
  box-shadow:3px 3px 0 var(--shadow); width:fit-content;
}
.typing-dot { width:7px; height:7px; background:var(--text-dim); animation:typing-bounce .6s ease infinite; }
.typing-dot:nth-child(2) { animation-delay:.2s; }
.typing-dot:nth-child(3) { animation-delay:.4s; }
@keyframes typing-bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);} }

.chat-input-area {
  padding:10px 16px; border-top:2px solid var(--border);
  display:flex; gap:8px;
}
.chat-input-area input {
  flex:1; font-family:'VT323',monospace; font-size:17px;
  padding:8px 10px; border:2px solid var(--border-hi);
  background:var(--bg-card); color:var(--text); outline:none;
}
.chat-input-area input:focus { border-color:var(--primary); }
.chat-input-area input::placeholder { color:var(--text-dim); }
.chat-send {
  font-family:'Press Start 2P',monospace; font-size:9px; color:#fff;
  background:var(--primary); border:2px solid var(--text-hi);
  padding:0 14px; cursor:pointer; box-shadow:3px 3px 0 var(--shadow); transition:transform .1s;
}
.chat-send:hover { transform:translate(1px,1px); box-shadow:2px 2px 0 var(--shadow); }
.chat-send:active { transform:translate(3px,3px); box-shadow:0 0 0 var(--shadow); }

/* ===== 右侧画布 ===== */
.canvas-panel { flex:1; display:flex; flex-direction:column; background:var(--bg); }
.canvas-header {
  padding:10px 20px; border-bottom:2px solid var(--border);
  display:flex; align-items:center; gap:12px;
}
.canvas-title { font-family:'Press Start 2P',monospace; font-size:11px; color:var(--text-hi); }
.canvas-hint { font-size:15px; color:var(--text-dim); margin-left:auto; }
.canvas-area {
  flex:1; position:relative; overflow:hidden;
  background-color:var(--bg-canvas);
  background-image:
    linear-gradient(rgba(168,158,133,.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,158,133,.18) 1px, transparent 1px);
  background-size:24px 24px;
}
.connections { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; }

/* ===== 节点 ===== */
.node {
  position:absolute; z-index:2; width:210px;
  background:var(--bg-card); border:3px solid var(--border-hi);
  box-shadow:5px 5px 0 var(--shadow);
  transition:box-shadow .2s, border-color .2s;
}
.node.highlight { animation:node-spawn .8s ease; }
@keyframes node-spawn {
  0% { opacity:0; transform:scale(.3); }
  50% { opacity:1; transform:scale(1.08); box-shadow:0 0 0 4px var(--primary), 5px 5px 0 var(--shadow); }
  100% { opacity:1; transform:scale(1); }
}
.node.updated { animation:node-pulse .6s ease; }
@keyframes node-pulse {
  0%,100% { box-shadow:5px 5px 0 var(--shadow); }
  50% { box-shadow:0 0 0 3px var(--asset), 5px 5px 0 var(--shadow); }
}
.node.completed { border-color:var(--success); }
.node-head {
  display:flex; align-items:center; gap:8px;
  padding:8px 10px; border-bottom:2px solid var(--border);
  background:var(--bg-card-hi);
}
.node-dot { width:8px; height:8px; background:var(--primary); flex-shrink:0; }
.node.completed .node-dot { background:var(--success); }
.node-title { font-size:16px; color:var(--text-hi); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.node.completed .node-title { text-decoration:line-through; color:var(--text-dim); }
.node-body {
  padding:10px; font-size:15px; line-height:1.4; color:var(--text);
  min-height:50px; user-select:text; -webkit-user-select:text;
}
.node.completed .node-body { color:var(--text-dim); }
.node-foot { padding:8px 10px; border-top:2px solid var(--border); display:flex; gap:6px; }
.node-btn {
  font-family:'VT323',monospace; font-size:15px;
  padding:4px 10px; cursor:pointer; border:2px solid var(--border-hi);
  background:var(--bg-card); color:var(--text); transition:all .1s;
  box-shadow:2px 2px 0 var(--shadow);
}
.node-btn:hover { background:var(--primary-bg); border-color:var(--primary); transform:translate(1px,1px); box-shadow:1px 1px 0 var(--shadow); }
.node-btn:active { transform:translate(2px,2px); box-shadow:0 0 0 var(--shadow); }
.node-btn.complete-btn { color:var(--success); border-color:var(--success); }
.node-btn.complete-btn:hover { background:var(--success-bg); }
.node-btn.done { background:var(--success); color:#fff; border-color:var(--success); cursor:default; }
.node-btn.done:hover { transform:none; box-shadow:2px 2px 0 var(--shadow); }

/* 标注（提问后添加） */
.annotation {
  margin-top:8px; padding:5px 8px; background:var(--asset-bg);
  border-left:3px solid var(--asset); font-size:14px; animation:ann-in .3s ease;
}
@keyframes ann-in { from { opacity:0; transform:translateX(-8px); } }
.ann-q { display:block; color:var(--asset); font-weight:bold; }
.ann-a { display:block; color:var(--text); margin-top:2px; }

/* ===== 浮动选择菜单 ===== */
.selection-menu {
  position:fixed; z-index:500; display:flex; gap:2px;
  background:var(--text-hi); padding:4px;
  box-shadow:4px 4px 0 var(--shadow);
  animation:menu-in .15s ease;
}
.selection-menu.hidden { display:none; }
@keyframes menu-in { from { opacity:0; transform:translateY(8px); } }
.sel-btn {
  background:var(--text-hi); color:#fff; border:none;
  font-family:'VT323',monospace; font-size:15px; padding:5px 10px; cursor:pointer;
  transition:background .1s;
}
.sel-btn:hover { background:var(--primary); }

/* ===== 提问弹窗 ===== */
.question-popup {
  position:fixed; z-index:510; background:var(--bg-panel);
  border:3px solid var(--border-hi); box-shadow:6px 6px 0 var(--shadow);
  padding:14px; width:300px; animation:menu-in .15s ease;
}
.question-popup.hidden { display:none; }
.qp-label { font-family:'Press Start 2P',monospace; font-size:10px; color:var(--text-hi); margin-bottom:8px; }
.qp-context { font-size:14px; color:var(--text-dim); margin-bottom:8px; padding:6px; background:var(--bg-card); border:2px solid var(--border); }
.qp-context b { color:var(--asset); }
.question-popup input {
  width:100%; font-family:'VT323',monospace; font-size:16px;
  padding:8px; border:2px solid var(--border-hi); background:var(--bg-card);
  color:var(--text); outline:none;
}
.question-popup input:focus { border-color:var(--primary); }
.qp-actions { display:flex; gap:8px; margin-top:10px; justify-content:flex-end; }
.qp-btn { font-family:'Press Start 2P',monospace; font-size:9px; padding:7px 12px; cursor:pointer; border:2px solid var(--text-hi); box-shadow:3px 3px 0 var(--shadow); transition:transform .1s; }
.qp-btn:hover { transform:translate(1px,1px); box-shadow:2px 2px 0 var(--shadow); }
.qp-btn.send { background:var(--primary); color:#fff; }
.qp-btn.cancel { background:var(--bg-card); color:var(--text); }

/* 保存提示 */
.save-toast {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:600;
  background:var(--success); color:#fff; font-family:'Press Start 2P',monospace; font-size:10px;
  padding:10px 18px; box-shadow:4px 4px 0 var(--shadow);
  animation:toast-show 1.5s ease forwards;
}
@keyframes toast-show {
  0% { opacity:0; transform:translate(-50%,20px); }
  20%,80% { opacity:1; transform:translate(-50%,0); }
  100% { opacity:0; transform:translate(-50%,-10px); }
}
</style>
</head>
<body>

<!-- 顶栏 -->
<header class="topbar">
  <div class="sync-indicator" id="syncIndicator">
    <span class="sync-dot"></span>
    <span class="sync-text">SYNC</span>
  </div>
  <div class="title">双向同步</div>
  <div class="desc">— 对话与画布实时双向联动</div>
  <div class="spacer"></div>
  <button class="replay-btn" id="replayBtn">重播对话</button>
</header>

<div class="main">
  <!-- 左侧对话 -->
  <section class="chat-panel">
    <div class="chat-header">
      <span class="chat-title">Agent 对话</span>
      <span class="chat-status">在线</span>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="输入消息后回车发送..." />
      <button class="chat-send" id="chatSend">发送</button>
    </div>
  </section>

  <!-- 右侧画布 -->
  <section class="canvas-panel">
    <div class="canvas-header">
      <span class="canvas-title">任务画布</span>
      <span class="canvas-hint">点击节点"完成" · 选中文字提问</span>
    </div>
    <div class="canvas-area" id="canvasArea">
      <svg class="connections" id="connections"></svg>
      <!-- 节点动态生成 -->
    </div>
  </section>
</div>

<!-- 浮动选择菜单 -->
<div class="selection-menu hidden" id="selectionMenu">
  <button class="sel-btn" data-action="ask">向agent提问</button>
  <button class="sel-btn" data-action="edit">编辑内容</button>
</div>

<!-- 提问弹窗 -->
<div class="question-popup hidden" id="questionPopup">
  <div class="qp-label">向 Agent 提问</div>
  <div class="qp-context" id="qpContext"></div>
  <input type="text" id="qpInput" placeholder="输入你的问题..." />
  <div class="qp-actions">
    <button class="qp-btn cancel" id="qpCancel">取消</button>
    <button class="qp-btn send" id="qpSend">发送</button>
  </div>
</div>

<script>
// ===== 对话脚本（自动播放） =====
const script = [
  { role:'agent', text:'你好，我来帮你规划今天的任务。' },
  { role:'agent', text:'首先，创建任务"完成项目方案"。',
    action:{ id:0, title:'完成项目方案', content:'整理参赛项目方案，包含技术选型和时间线', x:60, y:40 } },
  { role:'agent', text:'接着，添加任务"整理报税资料"。',
    action:{ id:1, title:'整理报税资料', content:'汇总2024年度收入和发票，准备申报', x:400, y:120 } },
  { role:'agent', text:'再加一个任务"写小说第二章"。',
    action:{ id:2, title:'写小说第二章', content:'完成"暗流"章节初稿，约3000字', x:100, y:300 } },
  { role:'agent', text:'最后，添加任务"复习算法笔记"。',
    action:{ id:3, title:'复习算法笔记', content:'复习动态规划和图论相关内容', x:430, y:380 } },
  { role:'agent', text:'四个任务已关联。你可以点击节点的"完成"按钮，或选中文字向 Agent 提问。' },
];

// 节点连接关系
const nodeConnections = [[0,1],[0,2],[1,3],[2,3]];

// Agent 回复模板
const agentReplies = [
  '好的，建议先梳理核心需求，再逐步细化实现步骤。',
  '根据现有信息，可以拆解为三个子步骤：分析、设计、验证。',
  '已将建议补充到节点内容中，请查看画布更新。',
  '这个方向不错，我帮你标注了关键点。',
  '明白，节点内容已同步更新，你可以继续操作。',
];

// ===== DOM 引用 =====
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const chatSend = document.getElementById('chatSend');
const canvasArea = document.getElementById('canvasArea');
const connectionsSvg = document.getElementById('connections');
const selectionMenu = document.getElementById('selectionMenu');
const questionPopup = document.getElementById('questionPopup');
const qpContext = document.getElementById('qpContext');
const qpInput = document.getElementById('qpInput');
const qpSend = document.getElementById('qpSend');
const qpCancel = document.getElementById('qpCancel');
const replayBtn = document.getElementById('replayBtn');
const syncIndicator = document.getElementById('syncIndicator');

// 节点数据
const nodes = []; // { id, el, title, content, completed }

// ===== 工具函数 =====
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function flashSync() {
  syncIndicator.classList.add('flash');
  setTimeout(() => syncIndicator.classList.remove('flash'), 1000);
}

function scrollChatBottom() {
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// ===== 添加聊天消息 =====
function addMessage(role, text, extraClass='') {
  const msg = document.createElement('div');
  msg.className = `chat-msg ${role} ${extraClass}`;
  const avatarText = role === 'agent' ? 'A' : 'U';
  msg.innerHTML = `
    <div class="chat-avatar">${avatarText}</div>
    <div class="chat-bubble">${text}</div>
  `;
  chatMessages.appendChild(msg);
  scrollChatBottom();
  return msg;
}

function addTyping() {
  const t = document.createElement('div');
  t.className = 'typing-indicator';
  t.id = 'typingIndicator';
  t.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  chatMessages.appendChild(t);
  scrollChatBottom();
  return t;
}

// ===== 创建节点 =====
function createNode(data) {
  const el = document.createElement('div');
  el.className = 'node highlight';
  el.dataset.id = data.id;
  el.style.left = data.x + 'px';
  el.style.top = data.y + 'px';
  el.innerHTML = `
    <div class="node-head">
      <span class="node-dot"></span>
      <span class="node-title">${data.title}</span>
    </div>
    <div class="node-body">${data.content}</div>
    <div class="node-foot">
      <button class="node-btn complete-btn">完成</button>
    </div>
  `;
  canvasArea.appendChild(el);

  const nodeData = { id:data.id, el, title:data.title, content:data.content, completed:false };
  nodes[data.id] = nodeData;

  // 完成按钮
  const completeBtn = el.querySelector('.complete-btn');
  completeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    completeNode(nodeData);
  });

  // 选中文字监听
  el.querySelector('.node-body').addEventListener('mouseup', (e) => {
    handleSelection(e, nodeData);
  });

  // 高亮动画结束后移除 class
  setTimeout(() => el.classList.remove('highlight'), 800);

  // 更新连接线
  updateConnections();
  flashSync();
  return nodeData;
}

// ===== 更新连接线 =====
function updateConnections() {
  connectionsSvg.innerHTML = '';
  nodeConnections.forEach(([a, b]) => {
    if (!nodes[a] || !nodes[b]) return;
    const ea = nodes[a].el, eb = nodes[b].el;
    const xa = ea.offsetLeft + ea.offsetWidth / 2;
    const ya = ea.offsetTop + ea.offsetHeight / 2;
    const xb = eb.offsetLeft + eb.offsetWidth / 2;
    const yb = eb.offsetTop + eb.offsetHeight / 2;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', xa); line.setAttribute('y1', ya);
    line.setAttribute('x2', xb); line.setAttribute('y2', yb);
    line.setAttribute('stroke', '#a89e85');
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-dasharray', '6 4');
    connectionsSvg.appendChild(line);
  });
}

// ===== 完成节点（画布→对话） =====
function completeNode(nodeData) {
  if (nodeData.completed) return;
  nodeData.completed = true;
  nodeData.el.classList.add('completed');
  const btn = nodeData.el.querySelector('.complete-btn');
  btn.textContent = '已完成';
  btn.classList.add('done');
  btn.disabled = true;

  // 对话窗口出现 agent 确认消息
  setTimeout(() => {
    const t = addTyping();
    setTimeout(() => {
      t.remove();
      addMessage('agent', `✓ 已确认完成：「${nodeData.title}」，同步状态已更新。`, 'sync-confirm');
      flashSync();
    }, 600);
  }, 300);
}

// ===== 选中文字处理 =====
let currentSelection = null;

function handleSelection(e, nodeData) {
  setTimeout(() => {
    const sel = window.getSelection();
    const text = sel.toString().trim();
    if (text.length < 2) {
      selectionMenu.classList.add('hidden');
      return;
    }
    // 确认选区在当前节点内
    const range = sel.getRangeAt(0);
    if (!nodeData.el.contains(range.commonAncestorContainer)) return;

    currentSelection = { node: nodeData, text };
    const rect = range.getBoundingClientRect();
    selectionMenu.style.left = (rect.left + rect.width / 2 - 80) + 'px';
    selectionMenu.style.top = (rect.top - 42) + 'px';
    selectionMenu.classList.remove('hidden');
  }, 10);
}

// 选择菜单按钮
selectionMenu.querySelectorAll('.sel-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const action = btn.dataset.action;
    if (!currentSelection) return;
    const rect = selectionMenu.getBoundingClientRect();
    selectionMenu.classList.add('hidden');

    if (action === 'ask') {
      showQuestionPopup(rect.left, rect.top + 40);
    } else if (action === 'edit') {
      enableEdit(currentSelection.node);
    }
  });
});

// 点击空白处关闭菜单
document.addEventListener('mousedown', (e) => {
  if (!e.target.closest('.selection-menu') && !e.target.closest('.question-popup')) {
    selectionMenu.classList.add('hidden');
    if (!e.target.closest('.node-body')) {
      // 保留选区直到用户操作完成
    }
  }
});

// ===== 提问弹窗 =====
function showQuestionPopup(x, y) {
  const sel = currentSelection.text;
  const preview = sel.length > 40 ? sel.slice(0, 40) + '...' : sel;
  qpContext.innerHTML = `选中内容：<b>「${preview}」</b>`;
  questionPopup.style.left = Math.min(x, window.innerWidth - 320) + 'px';
  questionPopup.style.top = Math.min(y, window.innerHeight - 180) + 'px';
  questionPopup.classList.remove('hidden');
  qpInput.value = '';
  setTimeout(() => qpInput.focus(), 50);
}

qpCancel.addEventListener('click', () => {
  questionPopup.classList.add('hidden');
  currentSelection = null;
});

qpSend.addEventListener('click', sendQuestion);
qpInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendQuestion();
  if (e.key === 'Escape') { questionPopup.classList.add('hidden'); currentSelection = null; }
});

function sendQuestion() {
  const question = qpInput.value.trim();
  if (!question) return;
  const node = currentSelection.node;
  const selText = currentSelection.text;
  questionPopup.classList.add('hidden');
  window.getSelection().removeAllRanges();

  // 对话窗口出现用户提问消息
  const preview = selText.length > 30 ? selText.slice(0,30) + '...' : selText;
  addMessage('user', `关于「${node.title} / ${preview}」：${question}`);
  flashSync();

  // Agent 回复
  const t = addTyping();
  setTimeout(() => {
    t.remove();
    const reply = agentReplies[Math.floor(Math.random() * agentReplies.length)];
    addMessage('agent', reply);

    // 画布节点内容更新（添加标注）
    const body = node.el.querySelector('.node-body');
    const ann = document.createElement('div');
    ann.className = 'annotation';
    ann.innerHTML = `<span class="ann-q">Q: ${question}</span><span class="ann-a">A: ${reply}</span>`;
    body.appendChild(ann);

    // 节点高亮动画
    node.el.classList.add('updated');
    setTimeout(() => node.el.classList.remove('updated'), 600);

    flashSync();
  }, 1200);

  currentSelection = null;
}

// ===== 编辑内容 =====
function enableEdit(nodeData) {
  const body = nodeData.el.querySelector('.node-body');
  body.contentEditable = true;
  body.focus();
  // 选中全部
  document.execCommand('selectAll', false, null);

  body.addEventListener('blur', function onBlur() {
    body.contentEditable = false;
    body.removeEventListener('blur', onBlur);
    nodeData.content = body.textContent.split('\n')[0]; // 保存第一段
    showSaveToast();
    flashSync();
  });
  body.addEventListener('keydown', function onKey(e) {
    if (e.key === 'Enter') { e.preventDefault(); body.blur(); }
    if (e.key === 'Escape') { body.blur(); }
  });
}

function showSaveToast() {
  const t = document.createElement('div');
  t.className = 'save-toast';
  t.textContent = '已保存';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1500);
}

// ===== 手动发送消息 =====
chatSend.addEventListener('click', sendChatMessage);
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendChatMessage();
});

function sendChatMessage() {
  const text = chatInput.value.trim();
  if (!text) return;
  addMessage('user', text);
  chatInput.value = '';
  flashSync();

  const t = addTyping();
  setTimeout(() => {
    t.remove();
    const reply = agentReplies[Math.floor(Math.random() * agentReplies.length)];
    addMessage('agent', reply);
  }, 1000);
}

// ===== 自动播放对话脚本 =====
let playing = false;

async function playScript() {
  if (playing) return;
  playing = true;

  for (const msg of script) {
    await delay(900);
    // 显示打字指示器
    const t = addTyping();
    await delay(700);
    t.remove();
    // 显示消息
    addMessage(msg.role, msg.text);
    // 触发画布动作
    if (msg.action) {
      await delay(400);
      createNode(msg.action);
    }
    flashSync();
  }
  playing = false;
}

// ===== 重播 =====
replayBtn.addEventListener('click', () => {
  if (playing) return;
  // 清空
  chatMessages.innerHTML = '';
  nodes.forEach(n => { if (n && n.el) n.el.remove(); });
  nodes.length = 0;
  connectionsSvg.innerHTML = '';
  selectionMenu.classList.add('hidden');
  questionPopup.classList.add('hidden');
  playScript();
});

// ===== 启动 =====
playScript();
</script>
</body>
</html>
