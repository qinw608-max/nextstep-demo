<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全局资产扫描 — SCAN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
:root {
  --bg: #f0ebe0; --bg-canvas: #e8e2d4; --bg-panel: #faf7f0;
  --bg-card: #ffffff; --bg-card-hi: #f5f1e8;
  --primary: #4a7c9e; --primary-dim: #6b9bb8; --primary-bg: #e3edf3;
  --success: #5b8c5a; --success-bg: #e8f0e8;
  --warning: #c4944a; --warning-bg: #f5edd9;
  --asset: #8b6fb0; --asset-bg: #ede8f5;
  --text: #3d3d3d; --text-dim: #8a8a8a; --text-hi: #1a1a1a;
  --border: #c9c2b0; --border-hi: #a89e85; --shadow: #d4cdb9;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family:'VT323', monospace;
  font-size:18px;
  background:var(--bg);
  color:var(--text);
  user-select:none;
}

/* ===== 顶栏 ===== */
.topbar {
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:56px;
  background:var(--bg-panel);
  border-bottom:3px solid var(--border-hi);
  box-shadow:0 3px 0 var(--shadow);
  display:flex; align-items:center; gap:16px;
  padding:0 20px;
}
.topbar .badge {
  width:28px; height:28px;
  background:var(--primary);
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-family:'Press Start 2P',monospace; font-size:10px;
  box-shadow:3px 3px 0 var(--shadow);
}
.topbar .title {
  font-family:'Press Start 2P',monospace; font-size:13px; color:var(--text-hi);
  letter-spacing:1px;
}
.topbar .desc { font-size:17px; color:var(--text-dim); }
.topbar .spacer { flex:1; }
.topbar .status-pill {
  font-size:16px; color:var(--text-dim);
  border:2px solid var(--border); padding:2px 10px; background:var(--bg-card);
}

/* ===== 视口与世界（平移缩放） ===== */
.viewport {
  position:fixed; top:56px; left:0; right:0; bottom:0;
  overflow:hidden; cursor:grab;
  background-color:var(--bg-canvas);
  background-image:
    linear-gradient(rgba(168,158,133,.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,158,133,.18) 1px, transparent 1px);
  background-size:24px 24px;
}
.viewport.grabbing { cursor:grabbing; }
.world {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  transform-origin:0 0;
  display:flex; align-items:center; justify-content:center;
  will-change:transform;
}

/* ===== 扫描按钮 ===== */
.scan-center {
  display:flex; flex-direction:column; align-items:center; gap:24px;
  transition:opacity .3s, transform .3s;
}
.scan-center.hidden { opacity:0; transform:scale(.5); pointer-events:none; }
.scan-btn {
  font-family:'Press Start 2P',monospace; font-size:18px;
  color:#fff; background:var(--primary);
  border:4px solid var(--text-hi);
  padding:28px 44px; cursor:pointer;
  box-shadow:0 0 0 4px var(--primary), 6px 6px 0 4px var(--text-hi), 6px 6px 0 10px var(--shadow);
  position:relative; animation:btn-glow 2s ease-in-out infinite;
  transition:transform .1s;
}
.scan-btn:hover { transform:translate(2px,2px); }
.scan-btn:active { transform:translate(4px,4px); }
@keyframes btn-glow { 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.15);} }
.scan-hint { font-size:18px; color:var(--text-dim); }
.scan-icon { font-size:32px; margin-bottom:8px; }

/* ===== 雷达 ===== */
.radar-wrap {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  display:flex; flex-direction:column; align-items:center; gap:20px;
  transition:opacity .5s;
}
.radar-wrap.hidden { opacity:0; pointer-events:none; }
.radar {
  width:320px; height:320px; position:relative;
}
.radar-ring {
  position:absolute; border:2px solid var(--primary-dim); border-radius:50%;
  top:50%; left:50%; transform:translate(-50%,-50%); opacity:.5;
}
.radar-ring.r1 { width:100%; height:100%; }
.radar-ring.r2 { width:66%; height:66%; }
.radar-ring.r3 { width:33%; height:33%; }
.radar-cross { position:absolute; background:var(--primary-dim); opacity:.3; }
.radar-cross.h { width:100%; height:2px; top:calc(50% - 1px); left:0; }
.radar-cross.v { width:2px; height:100%; left:calc(50% - 1px); top:0; }
.radar-sweep {
  position:absolute; width:100%; height:100%; border-radius:50%;
  background:conic-gradient(from 0deg, transparent 0deg, var(--primary) 290deg, var(--primary-dim) 350deg, transparent 360deg);
  opacity:.4; animation:sweep 1s linear infinite;
}
@keyframes sweep { to { transform:rotate(360deg); } }
.radar-center-dot {
  position:absolute; width:8px; height:8px; background:var(--primary);
  top:calc(50% - 4px); left:calc(50% - 4px);
}
.pulse-ring {
  position:absolute; border:2px solid var(--primary); border-radius:50%;
  top:50%; left:50%; transform:translate(-50%,-50%);
  animation:pulse 1.5s ease-out infinite;
}
@keyframes pulse {
  0% { width:8px; height:8px; opacity:.8; }
  100% { width:320px; height:320px; opacity:0; }
}
.scan-dot {
  position:absolute; width:6px; height:6px; background:var(--success);
  animation:dot-fade .8s ease-out forwards;
}
@keyframes dot-fade { 0%{opacity:1; transform:scale(1);} 100%{opacity:0; transform:scale(.3);} }
.radar-label {
  font-family:'Press Start 2P',monospace; font-size:11px; color:var(--primary);
  animation:blink 1s steps(2) infinite;
}
@keyframes blink { 50% { opacity:.3; } }

/* ===== 文件闪过面板 ===== */
.file-flash {
  position:absolute; top:calc(50% + 200px); left:50%; transform:translateX(-50%);
  width:440px; background:var(--bg-panel); border:3px solid var(--border-hi);
  box-shadow:6px 6px 0 var(--shadow); padding:12px 14px;
  transition:opacity .5s;
}
.file-flash.hidden { opacity:0; pointer-events:none; }
.ff-status { font-family:'Press Start 2P',monospace; font-size:10px; color:var(--primary); margin-bottom:6px; }
.ff-counter { font-size:16px; color:var(--text-dim); margin-bottom:8px; }
.ff-counter b { color:var(--success); }
.ff-list { height:90px; overflow:hidden; font-size:15px; line-height:1.5; }
.ff-item { color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ff-item:nth-child(1) { color:var(--text); }
.ff-item::before { content:'> '; color:var(--success); }

/* ===== 扫描完成 toast ===== */
.toast {
  position:fixed; top:76px; left:50%; transform:translateX(-50%); z-index:300;
  background:var(--success); color:#fff;
  font-family:'Press Start 2P',monospace; font-size:11px;
  padding:12px 20px; box-shadow:4px 4px 0 var(--shadow);
  animation:toast 2s ease forwards;
}
@keyframes toast {
  0% { opacity:0; transform:translate(-50%,-20px); }
  15%,85% { opacity:1; transform:translate(-50%,0); }
  100% { opacity:0; transform:translate(-50%,-20px); }
}

/* ===== 粒子爆发 ===== */
.particle {
  position:absolute; width:6px; height:6px; top:50%; left:50%;
  animation:particle .8s ease-out forwards;
}
@keyframes particle {
  0% { opacity:1; }
  100% { transform:translate(var(--tx),var(--ty)) scale(0); opacity:0; }
}

/* ===== 卡片网格 ===== */
.cards-grid {
  display:flex; flex-wrap:wrap; gap:24px; justify-content:center; align-items:flex-start;
  max-width:800px; padding:20px;
  transition:opacity .3s;
}
.cards-grid.hidden { opacity:0; pointer-events:none; }
.card {
  width:230px; background:var(--bg-card); border:3px solid var(--border-hi);
  box-shadow:6px 6px 0 var(--shadow); padding:0;
  cursor:pointer; position:relative; overflow:hidden;
  opacity:0; transition:transform .15s, box-shadow .15s, background .15s;
}
.card.fly-in { animation:fly-in .6s var(--delay,0s) cubic-bezier(.2,.8,.2,1.2) forwards; }
@keyframes fly-in {
  from { opacity:0; transform:translate(var(--fx,0), var(--fy,0)) scale(.7); }
  to { opacity:1; transform:translate(0,0) scale(1); }
}
.card:hover { transform:translate(-3px,-3px); box-shadow:9px 9px 0 var(--shadow); background:var(--bg-card-hi); }
.card-accent { height:6px; }
.card[data-theme=primary] .card-accent { background:var(--primary); }
.card[data-theme=warning] .card-accent { background:var(--warning); }
.card[data-theme=asset] .card-accent { background:var(--asset); }
.card[data-theme=success] .card-accent { background:var(--success); }
.card-body { padding:16px; }
.card-head { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.card-icon {
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  font-size:18px; color:#fff;
}
.card[data-theme=primary] .card-icon { background:var(--primary); }
.card[data-theme=warning] .card-icon { background:var(--warning); }
.card[data-theme=asset] .card-icon { background:var(--asset); }
.card[data-theme=success] .card-icon { background:var(--success); }
.card-name { font-family:'Press Start 2P',monospace; font-size:11px; color:var(--text-hi); }
.card-stats { display:flex; gap:12px; margin-bottom:12px; }
.stat { display:flex; flex-direction:column; align-items:center; flex:1; }
.stat-val { font-size:26px; line-height:1; color:var(--text-hi); }
.stat-label { font-size:14px; color:var(--text-dim); margin-top:2px; }
.card-progress { display:flex; align-items:center; gap:8px; }
.progress-track { flex:1; height:10px; background:var(--bg-canvas); border:2px solid var(--border); }
.progress-fill { height:100%; }
.card[data-theme=primary] .progress-fill { background:var(--primary); }
.card[data-theme=warning] .progress-fill { background:var(--warning); }
.card[data-theme=asset] .progress-fill { background:var(--asset); }
.card[data-theme=success] .progress-fill { background:var(--success); }
.progress-text { font-size:15px; color:var(--text-dim); min-width:36px; text-align:right; }

/* 新建模块卡片 */
.card.new-module {
  background:transparent; border:3px dashed var(--border-hi); box-shadow:none;
  display:flex; align-items:center; justify-content:center; min-height:165px;
}
.card.new-module .nm-inner { text-align:center; }
.card.new-module .nm-plus { font-size:36px; color:var(--border-hi); margin-bottom:6px; }
.card.new-module .nm-label { font-family:'Press Start 2P',monospace; font-size:10px; color:var(--text-dim); }
.card.new-module:hover { border-color:var(--primary); background:var(--primary-bg); }
.card.new-module:hover .nm-plus, .card.new-module:hover .nm-label { color:var(--primary); }

/* ===== 详情面板 ===== */
.detail-panel {
  position:fixed; top:56px; right:0; bottom:0; width:380px; z-index:250;
  background:var(--bg-panel); border-left:3px solid var(--border-hi);
  box-shadow:-6px 0 0 var(--shadow);
  transform:translateX(100%); transition:transform .35s cubic-bezier(.2,.8,.2,1);
  display:flex; flex-direction:column;
}
.detail-panel.open { transform:translateX(0); }
.dp-head {
  display:flex; align-items:center; gap:10px; padding:16px;
  border-bottom:2px solid var(--border);
}
.dp-icon { width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-size:18px; color:#fff; }
.dp-title { font-family:'Press Start 2P',monospace; font-size:12px; color:var(--text-hi); flex:1; }
.dp-close {
  width:32px; height:32px; background:var(--bg-card); border:2px solid var(--border-hi);
  cursor:pointer; font-size:18px; color:var(--text); box-shadow:3px 3px 0 var(--shadow);
  transition:transform .1s;
}
.dp-close:hover { transform:translate(1px,1px); box-shadow:2px 2px 0 var(--shadow); }
.dp-close:active { transform:translate(3px,3px); box-shadow:0 0 0 var(--shadow); }
.dp-stats { display:flex; gap:8px; padding:14px 16px; border-bottom:2px solid var(--border); }
.dp-stat { flex:1; text-align:center; padding:8px 4px; border:2px solid var(--border); background:var(--bg-card); }
.dp-stat .v { font-size:24px; color:var(--text-hi); line-height:1; }
.dp-stat .l { font-size:13px; color:var(--text-dim); margin-top:2px; }
.dp-progress { padding:10px 16px; display:flex; align-items:center; gap:8px; border-bottom:2px solid var(--border); }
.dp-files { flex:1; overflow-y:auto; padding:12px 16px; }
.dp-files::-webkit-scrollbar { width:8px; }
.dp-files::-webkit-scrollbar-thumb { background:var(--border-hi); }
.file-item {
  display:flex; align-items:center; gap:10px; padding:8px 10px; margin-bottom:6px;
  background:var(--bg-card); border:2px solid var(--border);
  transition:transform .1s, border-color .1s;
}
.file-item:hover { transform:translateX(3px); border-color:var(--primary); }
.file-badge {
  width:28px; height:28px; display:flex; align-items:center; justify-content:center;
  font-family:'Press Start 2P',monospace; font-size:9px; color:#fff;
}
.file-badge.doc { background:var(--primary); }
.file-badge.ppt { background:var(--warning); }
.file-badge.sheet { background:var(--success); }
.file-badge.video { background:var(--asset); }
.file-badge.code { background:var(--text-hi); }
.file-badge.img { background:var(--primary-dim); }
.file-info { flex:1; min-width:0; }
.file-name { font-size:16px; color:var(--text-hi); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.file-meta { font-size:13px; color:var(--text-dim); }
.file-dot { width:8px; height:8px; background:var(--success); }

/* ===== 底部控制栏 ===== */
.controls {
  position:fixed; bottom:16px; left:16px; z-index:100;
  display:flex; gap:8px; align-items:center;
}
.ctrl-btn {
  width:40px; height:40px; background:var(--bg-panel); border:3px solid var(--border-hi);
  cursor:pointer; font-size:18px; color:var(--text-hi); box-shadow:3px 3px 0 var(--shadow);
  display:flex; align-items:center; justify-content:center;
  transition:transform .1s, box-shadow .1s;
}
.ctrl-btn:hover { transform:translate(1px,1px); box-shadow:2px 2px 0 var(--shadow); }
.ctrl-btn:active { transform:translate(3px,3px); box-shadow:0 0 0 var(--shadow); }
.zoom-val { font-size:15px; color:var(--text-dim); background:var(--bg-panel); border:2px solid var(--border); padding:6px 10px; }

.rescan-btn {
  position:fixed; bottom:16px; right:16px; z-index:100;
  font-family:'Press Start 2P',monospace; font-size:10px; color:#fff;
  background:var(--text-hi); border:3px solid var(--text-hi); padding:12px 16px;
  cursor:pointer; box-shadow:4px 4px 0 var(--shadow); transition:transform .1s;
}
.rescan-btn:hover { transform:translate(2px,2px); box-shadow:2px 2px 0 var(--shadow); }
.rescan-btn:active { transform:translate(4px,4px); box-shadow:0 0 0 var(--shadow); }
.rescan-btn.hidden { display:none; }

/* 模块创建弹窗 */
.module-input-overlay {
  position:fixed; inset:0; z-index:280; background:rgba(0,0,0,.3);
  display:flex; align-items:center; justify-content:center;
}
.module-input-box {
  background:var(--bg-panel); border:3px solid var(--border-hi); box-shadow:8px 8px 0 var(--shadow);
  padding:24px; width:340px;
}
.module-input-box h3 { font-family:'Press Start 2P',monospace; font-size:12px; color:var(--text-hi); margin-bottom:16px; }
.module-input-box input {
  width:100%; font-family:'VT323',monospace; font-size:18px; padding:10px;
  border:3px solid var(--border-hi); background:var(--bg-card); color:var(--text); outline:none;
}
.module-input-box input:focus { border-color:var(--primary); }
.mi-actions { display:flex; gap:10px; margin-top:16px; justify-content:flex-end; }
.mi-btn { font-family:'Press Start 2P',monospace; font-size:10px; padding:10px 14px; cursor:pointer; border:3px solid var(--text-hi); box-shadow:4px 4px 0 var(--shadow); transition:transform .1s; }
.mi-btn:hover { transform:translate(2px,2px); box-shadow:2px 2px 0 var(--shadow); }
.mi-btn.ok { background:var(--primary); color:#fff; }
.mi-btn.cancel { background:var(--bg-card); color:var(--text); }
</style>
</head>
<body>

<!-- 顶栏 -->
<header class="topbar">
  <div class="badge">S</div>
  <div class="title">全局资产扫描</div>
  <div class="desc">— 扫描电脑文件，自动归类到板块</div>
  <div class="spacer"></div>
  <div class="status-pill" id="statusPill">就绪</div>
</header>

<!-- 视口（可平移缩放） -->
<div class="viewport" id="viewport">
  <div class="world" id="world">

    <!-- 扫描按钮 -->
    <div class="scan-center" id="scanCenter">
      <div class="scan-icon">▣</div>
      <button class="scan-btn" id="scanBtn">扫描我的电脑</button>
      <div class="scan-hint">点击开始全局资产扫描</div>
    </div>

    <!-- 雷达（扫描动画） -->
    <div class="radar-wrap hidden" id="radarWrap">
      <div class="radar" id="radar">
        <div class="radar-ring r1"></div>
        <div class="radar-ring r2"></div>
        <div class="radar-ring r3"></div>
        <div class="radar-cross h"></div>
        <div class="radar-cross v"></div>
        <div class="radar-sweep"></div>
        <div class="radar-center-dot"></div>
        <div class="pulse-ring" style="animation-delay:0s"></div>
        <div class="pulse-ring" style="animation-delay:.5s"></div>
        <div class="pulse-ring" style="animation-delay:1s"></div>
      </div>
      <div class="radar-label">SCANNING...</div>
    </div>

    <!-- 文件闪过面板 -->
    <div class="file-flash hidden" id="fileFlash">
      <div class="ff-status">扫描中<span class="dots">...</span></div>
      <div class="ff-counter">已发现 <b id="ffCount">0</b> 个文件</div>
      <div class="ff-list" id="ffList"></div>
    </div>

    <!-- 卡片网格 -->
    <div class="cards-grid hidden" id="cardsGrid"></div>

  </div>
</div>

<!-- 详情面板 -->
<aside class="detail-panel" id="detailPanel">
  <div class="dp-head">
    <div class="dp-icon" id="dpIcon">◆</div>
    <div class="dp-title" id="dpTitle">板块</div>
    <button class="dp-close" id="dpClose">✕</button>
  </div>
  <div class="dp-stats" id="dpStats"></div>
  <div class="dp-progress">
    <div class="progress-track" style="flex:1;height:12px;border:2px solid var(--border);background:var(--bg-canvas);">
      <div class="progress-fill" id="dpProgressFill" style="height:100%;width:0"></div>
    </div>
    <span class="progress-text" id="dpProgressText">0%</span>
  </div>
  <div class="dp-files" id="dpFiles"></div>
</aside>

<!-- 底部控制 -->
<div class="controls">
  <button class="ctrl-btn" id="zoomOut" title="缩小">−</button>
  <span class="zoom-val" id="zoomVal">100%</span>
  <button class="ctrl-btn" id="zoomIn" title="放大">+</button>
  <button class="ctrl-btn" id="resetView" title="重置">⊙</button>
</div>
<button class="rescan-btn hidden" id="rescanBtn">重新扫描</button>

<script>
// ===== 板块数据 =====

  { id:'novel', name:'小说创作', icon:'✦', theme:'asset',

    files:[
      {name:'第一章-初遇.md', type:'doc', size:'24 KB', date:'02-10'},
      {name:'人物设定表.md', type:'doc', size:'16 KB', date:'02-08'},
      {name:'世界观设定.md', type:'doc', size:'31 KB', date:'02-05'},
      {name:'故事大纲.txt', type:'code', size:'12 KB', date:'02-01'},
      {name:'第二章-暗流.md', type:'doc', size:'28 KB', date:'03-01'},
      {name:'封面草图.png', type:'img', size:'5.6 MB', date:'03-10'},

  { id:'study', name:'学习笔记', icon:'◈', theme:'success',
    tasks:10, completed:7, assets:31,

// ===== 平移缩放 =====
let tx = 0, ty = 0, scale = 1;
let isPanning = false, panStartX = 0, panStartY = 0;

function applyTransform() {
  world.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  zoomVal.textContent = Math.round(scale * 100) + '%';
}

viewport.addEventListener('mousedown', (e) => {
  // 点击卡片或控件时不平移
  if (e.target.closest('.card') || e.target.closest('.scan-btn') ||
      e.target.closest('.ctrl-btn') || e.target.closest('.rescan-btn') ||
      e.target.closest('.detail-panel')) return;
  isPanning = true;
  panStartX = e.clientX - tx;
  panStartY = e.clientY - ty;
  viewport.classList.add('grabbing');
});
window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  tx = e.clientX - panStartX;
  ty = e.clientY - panStartY;
  applyTransform();
});
window.addEventListener('mouseup', () => {
  isPanning = false;
  viewport.classList.remove('grabbing');
});

viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.3, Math.min(2.5, scale * delta));
  // 缩放朝向鼠标位置
  const wx = (mx - tx) / scale;
  const wy = (my - ty) / scale;
  tx = mx - wx * newScale;
  ty = my - wy * newScale;
  scale = newScale;
  applyTransform();
}, { passive:false });

document.getElementById('zoomIn').addEventListener('click', () => {
  scale = Math.min(2.5, scale * 1.2);
  applyTransform();
});
document.getElementById('zoomOut').addEventListener('click', () => {
  scale = Math.max(0.3, scale * 0.8);
  applyTransform();
});
document.getElementById('resetView').addEventListener('click', () => {
  tx = 0; ty = 0; scale = 1;
  applyTransform();
});

let flashTimer = null, dotTimer = null, countTimer = null;

scanBtn.addEventListener('click', startScan);

function startScan() {
  statusPill.textContent = '扫描中...';
  statusPill.style.color = 'var(--primary)';
  scanCenter.classList.add('hidden');
  setTimeout(() => {
    radarWrap.classList.remove('hidden');
    fileFlash.classList.remove('hidden');
    startFileFlash();
    startRadarDots();
    startCounter();
    // 2秒后扫描完成
    setTimeout(finishScan, 2000);
  }, 300);
}

function startFileFlash() {
  flashTimer = setInterval(() => {
    let html = '';
    const count = 5 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      const f = fakeFiles[Math.floor(Math.random() * fakeFiles.length)];
      html += `<div class="ff-item">${f}</div>`;
    }
    ffList.innerHTML = html;
  }, 120);
}

function startRadarDots() {
  dotTimer = setInterval(() => {
    const dot = document.createElement('div');
    dot.className = 'scan-dot';
    const angle = Math.random() * Math.PI * 2;
    const r = 20 + Math.random() * 130;
    dot.style.left = `calc(50% + ${Math.cos(angle) * r}px - 3px)`;
    dot.style.top = `calc(50% + ${Math.sin(angle) * r}px - 3px)`;
    dot.style.background = ['#5b8c5a','#4a7c9e','#c4944a','#8b6fb0'][Math.floor(Math.random()*4)];
    radar.appendChild(dot);
    setTimeout(() => dot.remove(), 800);
  }, 150);
}

function startCounter() {
  let c = 0;
  countTimer = setInterval(() => {
    c += Math.floor(Math.random() * 15) + 5;
    ffCount.textContent = c;
  }, 100);
}

function finishScan() {
  clearInterval(flashTimer);
  clearInterval(dotTimer);
  clearInterval(countTimer);
  ffCount.textContent = '116';

  // 粒子爆发
  spawnParticles();

  // 雷达淡出
  radarWrap.classList.add('hidden');
  fileFlash.classList.add('hidden');

  // toast
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = '扫描完成 / 发现 116 个文件';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);

  // 显示卡片
  setTimeout(showCards, 400);
  statusPill.textContent = '扫描完成';
  statusPill.style.color = 'var(--success)';
}

function spawnParticles() {
  const colors = ['#4a7c9e','#5b8c5a','#c4944a','#8b6fb0'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 * i) / 40;
    const dist = 150 + Math.random() * 250;
    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    p.style.background = colors[i % 4];
    p.style.animationDelay = (Math.random() * 0.2) + 's';
    radar.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

function showCards() {

          <div class="card-name">${cat.name}</div>
        </div>

        </div>

      <div class="nm-label">新建模块</div>
    </div>
  `;
  nmCard.addEventListener('click', openNewModule);
  cardsGrid.appendChild(nmCard);

  rescanBtn.classList.remove('hidden');
}

function openDetail(cat) {
  const pct = Math.round((cat.completed / cat.tasks) * 100);
  document.getElementById('dpIcon').textContent = cat.icon;
  document.getElementById('dpIcon').style.background = themeColors[cat.theme];
  document.getElementById('dpTitle').textContent = cat.name;

  const dpStats = document.getElementById('dpStats');
  dpStats.innerHTML = `
    <div class="dp-stat"><div class="v">${cat.tasks}</div><div class="l">任务</div></div>
    <div class="dp-stat"><div class="v">${cat.completed}</div><div class="l">完成</div></div>
    <div class="dp-stat"><div class="v">${cat.assets}</div><div class="l">资产</div></div>
  `;

  const fill = document.getElementById('dpProgressFill');
  fill.style.background = themeColors[cat.theme];
  fill.style.width = '0%';
  document.getElementById('dpProgressText').textContent = pct + '%';

  const dpFiles = document.getElementById('dpFiles');
  dpFiles.innerHTML = '';
  cat.files.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.style.opacity = '0';
    item.style.transform = 'translateX(20px)';
    item.style.transition = 'opacity .3s, transform .3s';
    item.innerHTML = `
      <div class="file-badge ${f.type}">${f.type[0].toUpperCase()}</div>
      <div class="file-info">
        <div class="file-name">${f.name}</div>
        <div class="file-meta">${f.size} · ${f.date}</div>
      </div>
      <div class="file-dot"></div>
    `;
    dpFiles.appendChild(item);
    setTimeout(() => {
      item.style.opacity = '1';
      item.style.transform = 'translateX(0)';
    }, 80 + i * 60);
  });

  detailPanel.classList.add('open');
  // 进度条动画
  setTimeout(() => { fill.style.width = pct + '%'; }, 200);
}

function closeDetail() {
  detailPanel.classList.remove('open');
}

// ===== 新建模块 =====
function openNewModule() {
  const overlay = document.createElement('div');
  overlay.className = 'module-input-overlay';
  overlay.innerHTML = `
    <div class="module-input-box">
      <h3>新建模块</h3>
      <input type="text" id="miInput" placeholder="输入模块名称..." maxlength="20" />
      <div class="mi-actions">
        <button class="mi-btn cancel" id="miCancel">取消</button>
        <button class="mi-btn ok" id="miOk">创建</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  const input = document.getElementById('miInput');
  input.focus();
  const close = () => overlay.remove();
  document.getElementById('miCancel').addEventListener('click', close);
  document.getElementById('miOk').addEventListener('click', () => {
    const name = input.value.trim() || '新模块';
    addNewModuleCard(name);
    close();
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('miOk').click();
    if (e.key === 'Escape') close();
  });
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
}

let newModuleCount = 0;
function addNewModuleCard(name) {
  newModuleCount++;
  const cat = {
    id: 'new' + newModuleCount,
    name: name,
    icon: '◇',
    theme: 'primary',
    tasks: 0, completed: 0, assets: 0,
    files: []
  };
  const card = document.createElement('div');
  card.className = 'card fly-in';
  card.dataset.theme = 'primary';
  card.dataset.id = cat.id;
  card.style.setProperty('--fx', '0px');
  card.style.setProperty('--fy', '300px');
  card.style.setProperty('--delay', '0s');
  card.innerHTML = `
    <div class="card-accent"></div>
    <div class="card-body">
      <div class="card-head">
        <div class="card-icon">${cat.icon}</div>
        <div class="card-name">${cat.name}</div>

      <div class="card-stats">
        <div class="stat"><span class="stat-val">0</span><span class="stat-label">任务</span></div>
        <div class="stat"><span class="stat-val">0</span><span class="stat-label">完成</span></div>
        <div class="stat"><span class="stat-val">0</span><span class="stat-label">资产</span></div>

  // 插入到新建模块卡片之前
  const nmCard = cardsGrid.querySelector('.new-module');
  cardsGrid.insertBefore(card, nmCard);
}
